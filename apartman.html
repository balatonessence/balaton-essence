<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartman Részletek | Balaton Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #F9F9F7;
            --color-text: #1A1A1A;
            --color-accent: #E76F51;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--color-bg); color: var(--color-text); line-height: 1.7; }

        header { padding: 2rem 5vw; display: flex; justify-content: space-between; align-items: center; }
        .back-link { text-decoration: none; color: var(--color-text); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        .hero-image {
            width: 100%; height: 70vh;
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 5vw;
        }

        .hero-title {
            font-family: 'Playfair Display', serif; font-size: clamp(3rem, 8vw, 6rem);
            color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,0.3); line-height: 1;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 5rem 5vw; display: grid; grid-template-columns: 2fr 1fr; gap: 4rem; }

        .description h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 2rem; }
        .description p { margin-bottom: 1.5rem; color: #444; font-size: 1.1rem; }

        .gallery {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 4rem;
        }
        .gallery-item { height: 300px; background: #eee; border-radius: 2px; }

        /* Sticky foglalási kártya */
        .sticky-box {
            position: sticky; top: 120px;
            background: #fff; padding: 2.5rem; border: 1px solid #eee;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center;
            height: fit-content;
        }
        .sticky-box .price { font-size: 2rem; font-family: 'Playfair Display', serif; margin-bottom: 1rem; display: block; }
        .btn-book-now {
            width: 100%; background: var(--color-text); color: #fff; border: none;
            padding: 1.2rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-book-now:hover { background: var(--color-accent); }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .hero-image { height: 50vh; }
            .sticky-box { position: relative; top: 0; margin-top: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Vissza a kínálathoz</a>
        <div style="font-family: 'Playfair Display'; font-weight: 700; font-size: 1.2rem;">Balaton<span>.</span></div>
    </header>

    <div id="hero" class="hero-image">
        <h1 id="title" class="hero-title">Apartman Neve</h1>
    </div>

    <main>
        <div class="description">
            <h2 id="subtitle">Érezze magát otthon a vízparton</h2>
            <p id="desc-text">Betöltés alatt...</p>
            
            <div class="gallery">
                <div class="gallery-item" style="background: #ddd;"></div>
                <div class="gallery-item" style="background: #ccc;"></div>
                <div class="gallery-item" style="background: #bbb;"></div>
                <div class="gallery-item" style="background: #aaa;"></div>
            </div>
        </div>

        <aside>
            <div class="sticky-box">
                <span class="price" id="price-display">0 Ft</span>
                <p style="margin-bottom: 2rem; color: #888; font-size: 0.9rem;">Ár éjszakánként, az egész apartmanra vonatkozik.</p>
                <button class="btn-book-now" onclick="startBooking()">Foglalás indítása</button>
            </div>
        </aside>
    </main>

    <script>
        // Ez a JS olvassa ki az URL-ből az ID-t: apartman.html?id=1
        const urlParams = new URLSearchParams(window.location.search);
        const aptId = parseInt(urlParams.get('id'));

        const db = {
            apartments: [
                { id: 1, name: "Aranypart Panoráma", location: "Siófok", price: 35000, color: "#E76F51", desc: "Siófok legszebb részén, közvetlenül az Aranyparton található ez a modern, minden igényt kielégítő apartman. Hatalmas teraszáról zavartalan kilátás nyílik a tóra, így a naplemente minden este egy privát moziélmény." },
                { id: 2, name: "Tihanyi Búvóhely", location: "Tihany", price: 42000, color: "#0077B6", desc: "A félsziget szívében, a történelmi apátság árnyékában bújik meg ez az exkluzív lakás. A belső tér a minimalista design és a természetes anyagok ötvözete, tökéletes választás a csendre vágyóknak." },
                { id: 3, name: "Füredi Vitorlás", location: "Balatonfüred", price: 38000, color: "#2A9D8F", desc: "Balatonfüred nyüzsgő sétányától pár percre, mégis nyugodt környezetben várja vendégeit ez a vitorlás stílusú apartman. Prémium anyaghasználat, tágas terek és saját parkoló biztosítja a kényelmet." }
            ]
        };

        const apt = db.apartments.find(a => a.id === aptId);

        if(apt) {
            document.getElementById('title').innerText = apt.name;
            document.getElementById('price-display').innerText = apt.price.toLocaleString('hu-HU') + " Ft";
            document.getElementById('desc-text').innerText = apt.desc;
            document.getElementById('hero').style.background = `linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.6)), linear-gradient(45deg, ${apt.color}, #06111C)`;
            document.title = `${apt.name} | Balaton Exclusive`;
        } else {
            window.location.href = 'index.html';
        }

        function startBooking() {
            // Egy egyszerűbb megoldás a demóhoz: visszaküldjük a főoldalra és ott nyitjuk meg a modalt
            // (Profi megoldásnál a modal kódja egy külön JS modulban lenne, amit mindkét oldal betölt)
            alert("A foglaláshoz kérjük, használja a főoldali gyorsfoglalót!");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
