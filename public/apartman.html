<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartman Részletek | Balaton Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FCFBF9; --text: #2C3325; --text-light: #6A7063;  
            --accent: #5C7A4D; --border: #E3E0D8; --warning: #B0413E;
            --shadow: rgba(44, 51, 37, 0.08);
            --transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); padding-top: 40px; -webkit-font-smoothing: antialiased; }

        /* FEJLESZTÉSI BANNER - Kicsit finomabb */
        .dev-banner {
            background: var(--warning); color: white; text-align: center; padding: 10px 5vw;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; position: fixed;
            top: 0; left: 0; width: 100%; z-index: 3000; text-transform: uppercase;
        }

        /* HEADER */
        header { position: fixed; top: 40px; left: 0; width: 100%; padding: 1.5rem 5vw; background: rgba(252, 251, 249, 0.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display'; font-size: 1.2rem; font-weight: 700; text-decoration: none; color: var(--text); letter-spacing: 2px; text-transform: uppercase; }

        main { max-width: 1300px; margin: 160px auto 100px; padding: 0 5vw; }
        
        /* Layout Grid */
        .apt-container { display: grid; grid-template-columns: 1fr; gap: 3rem; }
        @media (min-width: 992px) { .apt-container { grid-template-columns: 1.6fr 1fr; gap: 6rem; } }

        .apt-title { font-family: 'Playfair Display'; font-size: clamp(2.8rem, 5vw, 4.5rem); font-style: italic; margin-bottom: 0.5rem; line-height: 1.1; color: var(--text); }
        .apt-location-tag { text-transform: uppercase; letter-spacing: 3px; color: var(--accent); font-weight: 600; font-size: 0.7rem; margin-bottom: 1rem; }

        /* FŐKÉP - Elegáns keret és árnyék */
        .main-image-wrapper { 
            margin: 3.5rem 0; 
            box-shadow: 0 40px 80px rgba(44, 51, 37, 0.1); 
            border-radius: 2px; 
            overflow: hidden;
            background: #eee; /* Placeholder szín */
            aspect-ratio: 16 / 10;
        }
        
        /* GALÉRIA GRID - Szellősebb */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-top: 5rem; }
        
        /* Kép stílusok és finom beúszás animáció */
        .img-container {
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }


        .gallery-img { 
            width: 100%; height: 100%; object-fit: cover; 
            cursor: pointer; transition: var(--transition);
            display: block; 
            opacity: 1; 
            transform: translateY(0); 
        }


        .gallery-img.loaded { 
            opacity: 1; 
            transform: translateY(0); 
        }

        /* A hover maradjon meg, az szép: */
        .gallery-img:hover { 
            transform: scale(1.03); 
            opacity: 0.9;
        }

        /* BOOKING CARD - Letisztultabb */
        .booking-card { 
            background: white; 
            border: 1px solid var(--border); 
            padding: 3.5rem 3rem; 
            position: sticky; 
            top: 180px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.04); 
            border-radius: 4px;
        }
        
        .price-tag { font-size: 1.6rem; font-weight: 300; color: var(--text-light); margin-bottom: 2rem; }
        .price-num { font-weight: 600; color: var(--text); }

        .btn-booking { 
            width: 100%; 
            background: #EAE8E2; /* Világosabb szürke */
            color: #888; 
            border: none; 
            padding: 1.3rem; 
            border-radius: 50px; 
            font-weight: 700; 
            text-transform: uppercase; 
            cursor: not-allowed; 
            margin-top: 2rem;
            letter-spacing: 2px; 
            font-size: 0.7rem;
            transition: var(--transition);
        }
        .dev-status { color: var(--warning); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6; display: flex; align-items: center; gap: 8px; }

        /* LIGHTBOX - Sötétebb, elegánsabb */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 8, 0.98); z-index: 4000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s ease; }
        .lightbox.active { opacity: 1; display: flex; }
        
        .lightbox-img { max-width: 90%; max-height: 85vh; object-fit: contain; box-shadow: 0 50px 100px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        .lightbox-close { position: absolute; top: 2.5rem; right: 2.5rem; color: white; font-size: 1.8rem; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .lightbox-close:hover { opacity: 1; transform: rotate(90deg); }
        
        .lightbox-nav { position: absolute; color: white; font-size: 4rem; cursor: pointer; padding: 2rem; user-select: none; opacity: 0.3; transition: 0.3s; font-family: serif; }
        .lightbox-nav:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .nav-prev { left: 0; } .nav-next { right: 0; }
        
        /* Gördülékeny animáció az oldal betöltésekor */
        #main-content { animation: fadeInPage 1s ease forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="dev-banner">
    HU: Az oldal fejlesztés alatt áll, foglalás jelenleg nem lehetséges. | EN: Site under development.
</div>

<header>
    <a href="index.html" class="logo">BALATON ESSENCE</a>
</header>

<main id="main-content" style="display: none;">
    <div class="apt-container">
        <div>
            <p id="apt-loc" class="apt-location-tag"></p>
            <h1 id="apt-name" class="apt-title"></h1>
            
            <div class="main-image-wrapper">
                <img id="apt-main-img" src="" class="gallery-img" onclick="openLightbox(0)" onload="this.classList.add('loaded')">
            </div>

            <div id="apt-gallery" class="gallery-grid"></div>

            <div id="apt-desc" style="margin-top: 1.5rem; font-size: 1.1rem; line-height: 1.6; color: #555; font-family: 'Inter', sans-serif;"></div>
        </div>

        <div>
            <div class="booking-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 1rem; font-style: italic;">Ajánlatkérés</h3>
                <p id="apt-price" class="price-tag"></p>
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 2.5rem 0;">
                
                <div class="dev-status">
                    <span>⚠️</span>
                    <span>A foglalási rendszer karbantartás miatt átmenetileg szünetel.</span>
                </div>
                
                <button class="btn-booking">Foglalás nem lehetséges</button>
            </div>
        </div>
    </div>
</main>

<div id="booking-modal" class="lightbox" style="background: rgba(252, 251, 249, 0.98); color: var(--text);">
    <div style="background: white; width: 95%; max-width: 600px; padding: 3rem; border: 1px solid var(--border); position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 50px 100px rgba(0,0,0,0.1);">
        <span class="lightbox-close" onclick="closeBookingModal()" style="color: var(--text);">✕</span>
        
        <h2 style="font-family: 'Playfair Display'; font-size: 2.2rem; margin-bottom: 0.5rem;">Foglalási adatok</h2>
        <p id="modal-apt-name" style="color: var(--accent); font-weight: 600; letter-spacing: 1px; margin-bottom: 2.5rem; text-transform: uppercase; font-size: 0.8rem;"></p>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem;">
            <div class="form-group">
                <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 8px;">Érkezés</label>
                <input type="date" id="book-start" style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 2px;" onchange="calculateStay()">
            </div>
            <div class="form-group">
                <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 8px;">Távozás</label>
                <input type="date" id="book-end" style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 2px;" onchange="calculateStay()">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem;">
            <div class="form-group">
                <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 8px;">Vendégek száma</label>
                <select id="book-guests" style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 2px;" onchange="calculateStay()">
                    <option value="2">1-2 Fő</option>
                    <option value="3">3 Fő</option>
                    <option value="4">4 Fő</option>
                </select>
            </div>
            <div id="stay-info" style="display: flex; align-items: center; font-size: 0.9rem; color: var(--accent); font-weight: 600;">
                Válassz dátumot...
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 2rem 0;">

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <input type="text" id="book-name" placeholder="Teljes név" style="width: 100%; padding: 1.2rem; border: 1px solid var(--border); border-radius: 2px;">
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <input type="email" id="book-email" placeholder="E-mail cím" style="width: 100%; padding: 1.2rem; border: 1px solid var(--border); border-radius: 2px;">
        </div>
        <div class="form-group" style="margin-bottom: 2.5rem;">
            <textarea id="book-msg" placeholder="Megjegyzés (opcionális)" rows="3" style="width: 100%; padding: 1.2rem; border: 1px solid var(--border); border-radius: 2px; font-family: inherit;"></textarea>
        </div>

        <div id="total-price-box" style="background: var(--bg); padding: 1.5rem; text-align: right; margin-bottom: 2rem; border-radius: 2px;">
            <span style="font-size: 0.8rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px;">Összesen:</span>
            <div id="grand-total" style="font-size: 2rem; font-weight: 700; font-family: 'Playfair Display';">0 Ft</div>
        </div>

        <button onclick="sendBookingRequest()" class="btn-booking" style="background: var(--accent); color: white; cursor: pointer; opacity: 1;">Ajánlatkérés elküldése</button>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">✕</span>
    <span class="lightbox-nav nav-prev" onclick="event.stopPropagation(); changeImage(-1)">‹</span>
    <img id="lightbox-img" class="lightbox-img" src="" onclick="event.stopPropagation()">
    <span class="lightbox-nav nav-next" onclick="event.stopPropagation(); changeImage(1)">›</span>
</div>

<script src="database.js?v=16.1"></script>
<script>
    let currentApt = null;
    let allImages = [];
    let currentIndex = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));

        await initDatabase(() => {
            currentApt = db.apartments.find(a => a.id === id);
            if (currentApt) {
                renderDetails();
                document.getElementById('main-content').style.display = 'block';
            } else {
                window.location.href = "index.html";
            }
        });
    });

    function renderDetails() {
        const today = new Date();
        const info = getAptStatusAndPrice(currentApt, today);
        
        // 1. ALAPADATOK
        document.getElementById('apt-name').innerText = currentApt.name || "Ismeretlen Apartman";
        document.getElementById('apt-loc').innerText = currentApt.location || "";
        
        const descEl = document.getElementById('apt-desc');
        if (descEl) {
            descEl.innerText = currentApt.description || "Nincs megadva leírás.";
        }

        // 2. FOGLALÁSI KÁRTYA (Ár, Szezon infó, Max fő)
        const priceTag = document.getElementById('apt-price');
        const bookingBtn = document.querySelector('.btn-booking');
        
        // Itt keressük meg a kis információs sávot a kártya alján
        const statusMsg = document.querySelector('.dev-status span:last-child');

        if (info.status === 'OPEN') {
            priceTag.innerHTML = `<span class="price-num">${info.price.toLocaleString()} Ft</span> / éjszaka`;
            bookingBtn.innerText = "Foglalás";
            bookingBtn.disabled = false;
            bookingBtn.style.opacity = "1";
            bookingBtn.style.cursor = "pointer";
            bookingBtn.onclick = openBookingModal;

            // MEGJELENÍTÉS: Szezon neve + Max fő + Min éj
            statusMsg.innerHTML = `
                <div style="margin-top: 10px; border-top: 1px solid #eee; pt: 10px;">
                    <p><strong>Aktuális időszak:</strong> ${info.label}</p>
                    <p><strong>Kapacitás:</strong> max. ${info.maxGuests} fő</p>
                    <p><strong>Minimum tartózkodás:</strong> ${info.minNights} éjszaka</p>
                </div>
            `;
        } else {
            priceTag.innerHTML = `<span style="color:var(--warning)">Szezonon kívül</span>`;
            bookingBtn.innerText = "Jelenleg zárva";
            bookingBtn.disabled = true;
            bookingBtn.style.opacity = "0.5";
            statusMsg.innerText = "Az apartman április 1. és szeptember 30. között fogad vendégeket.";
        }

        // 3. KÉPEK ÉS GALÉRIA (Változatlan)
        const cImg = currentApt.coverImage || ''; 
        const gImgs = currentApt.galleryImages || [];
        allImages = cImg ? [cImg, ...gImgs] : [...gImgs];
        
        const mainImg = document.getElementById('apt-main-img');
        if (cImg) { mainImg.src = cImg; mainImg.style.display = 'block'; }
        
        const gal = document.getElementById('apt-gallery');
        if (gal) {
            gal.innerHTML = "";
            gImgs.forEach((img, idx) => {
                const lbIndex = cImg ? idx + 1 : idx;
                gal.innerHTML += `
                    <div class="img-container">
                        <img src="${img}" class="gallery-img" onclick="openLightbox(${lbIndex})">
                    </div>`;
            });
        }
    }

    // --- LIGHTBOX LOGIKA ---

    function openLightbox(index) {
        if (!allImages || allImages.length === 0) return; // Biztonsági csekk
        currentIndex = index;
        document.getElementById('lightbox-img').src = allImages[currentIndex];
        const lb = document.getElementById('lightbox');
        lb.style.display = 'flex';
        setTimeout(() => lb.classList.add('active'), 10); 
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('active');
        setTimeout(() => {
            lb.style.display = 'none';
            document.body.style.overflow = 'auto';
        }, 500);
    }

    function changeImage(dir) {
        if (!allImages || allImages.length === 0) return;
        currentIndex = (currentIndex + dir + allImages.length) % allImages.length;
        document.getElementById('lightbox-img').src = allImages[currentIndex];
    }

    document.addEventListener('keydown', (e) => {
        const lb = document.getElementById('lightbox');
        if (lb && (lb.style.display === 'flex' || lb.classList.contains('active'))) {
            if (e.key === "ArrowLeft") changeImage(-1);
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "Escape") closeLightbox();
        }
    });

    function openBookingModal() {
        const modal = document.getElementById('booking-modal');
        document.getElementById('modal-apt-name').innerText = currentApt.name;
        
        // Alapértelmezett dátumok (holnap és holnapután)
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const dayAfter = new Date(tomorrow);
        dayAfter.setDate(dayAfter.getDate() + 2);

        document.getElementById('book-start').value = tomorrow.toISOString().split('T')[0];
        document.getElementById('book-end').value = dayAfter.toISOString().split('T')[0];
        
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
        document.body.style.overflow = 'hidden';
        calculateStay();
    }

    function closeBookingModal() {
        const modal = document.getElementById('booking-modal');
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }, 500);
    }

    function calculateStay() {
        const start = new Date(document.getElementById('book-start').value);
        const end = new Date(document.getElementById('book-end').value);
        const guests = parseInt(document.getElementById('book-guests').value);
        
        if (isNaN(start) || isNaN(end) || end <= start) {
            document.getElementById('stay-info').innerText = "Hibás dátumok";
            document.getElementById('grand-total').innerText = "0 Ft";
            return;
        }

        const nights = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
        let total = 0;
        let minNightsRequired = 2;

        // Árszámítás éjszakánként (mert lehet, hogy a szezon átfedésben van)
        for (let i = 0; i < nights; i++) {
            let currentDay = new Date(start);
            currentDay.setDate(currentDay.getDate() + i);
            const info = getAptStatusAndPrice(currentApt, currentDay, guests);
            
            if (info.status === 'OPEN') {
                total += info.price;
                minNightsRequired = info.minNights; // Az utolsó érvényes szezon szabályát vesszük
            } else {
                document.getElementById('stay-info').innerHTML = "<span style='color:var(--warning)'>Zárva tartás a választott napokon!</span>";
                document.getElementById('grand-total').innerText = "Zárva";
                return;
            }
        }

        document.getElementById('stay-info').innerHTML = `${nights} éjszaka <br> <small>(Min. ${minNightsRequired} éj szükséges)</small>`;
        document.getElementById('grand-total').innerText = total.toLocaleString() + " Ft";
        
        // Gomb tiltása, ha nem éri el a min. éjszakát
        const btn = document.querySelector('#booking-modal .btn-booking');
        if (nights < minNightsRequired) {
            btn.style.opacity = "0.5";
            btn.disabled = true;
            btn.innerText = `Min. ${minNightsRequired} éjszaka kell`;
        } else {
            btn.style.opacity = "1";
            btn.disabled = false;
            btn.innerText = "Ajánlatkérés elküldése";
        }
    }

    async function sendBookingRequest() {
    const data = {
        aptId: currentApt.id,
        aptName: currentApt.name,
        guestName: document.getElementById('book-name').value, // Admin táblázathoz 'guestName' kell
        email: document.getElementById('book-email').value,
        checkIn: document.getElementById('book-start').value, // Admin táblázathoz 'checkIn' kell
        end: document.getElementById('book-end').value,
        guests: document.getElementById('book-guests').value,
        total: document.getElementById('grand-total').innerText,
        msg: document.getElementById('book-msg').value,
        source: 'Weboldal' // Hogy lásd az adminban, honnan jött
    };

    if (!data.guestName || !data.email) {
        alert("Kérlek töltsd ki a nevedet és az e-mailedet!");
        return;
    }

    try {
        const res = await fetch('/api/new-booking', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            alert(`Köszönjük, ${data.guestName}! Az ajánlatkérést rögzítettük. Hamarosan keresünk!`);
            closeBookingModal();
            window.location.reload(); // Frissítés, hogy látszódjon a változás
        }
    } catch (e) {
        alert("Hiba történt a küldés során. Kérlek próbáld újra!");
    }
}
</script>
</body>
</html>
