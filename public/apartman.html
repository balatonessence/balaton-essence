<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartman Részletek | Balaton Essence</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FCFBF9;
            --text: #2C3325;
            --text-light: #6A7063;
            --accent: #5C7A4D;
            --accent-soft: #5c7a4d33;
            --border: #E3E0D8;
            --warning: #B0413E;
            --shadow: rgba(44, 51, 37, 0.08);
            --transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .dev-banner {
            background: var(--warning);
            color: white;
            text-align: center;
            padding: 10px 5vw;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 3000;
            text-transform: uppercase;
        }

        header {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            padding: 1.5rem 5vw;
            background: rgba(252, 251, 249, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            max-width: 1300px;
            margin: 160px auto 100px;
            padding: 0 5vw;
        }

        .apt-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        @media (min-width: 992px) {
            .apt-container {
                grid-template-columns: 1.6fr 1fr;
                gap: 6rem;
            }
        }

        .apt-title {
            font-family: 'Playfair Display';
            font-size: clamp(2.8rem, 5vw, 4.5rem);
            font-style: italic;
            margin-bottom: 0.5rem;
            line-height: 1.1;
            color: var(--text);
        }

        .apt-location-tag {
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.7rem;
            margin-bottom: 1rem;
        }

        .apt-address-box {
            display: none;
            background: #f9fbf8;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-top: 1.3rem;
            max-width: 620px;
        }

        .apt-address-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-light);
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .apt-address-value {
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.5;
        }

        .main-image-wrapper {
            margin: 3.5rem 0;
            box-shadow: 0 40px 80px rgba(44, 51, 37, 0.1);
            border-radius: 2px;
            overflow: hidden;
            background: #eee;
            aspect-ratio: 16 / 10;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-top: 5rem;
        }

        .img-container {
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: var(--transition);
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-img.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-img:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .booking-card {
            background: white;
            border: 1px solid var(--border);
            padding: 3.5rem 3rem;
            position: sticky;
            top: 180px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.04);
            border-radius: 4px;
        }

        .price-tag {
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .price-num {
            font-weight: 600;
            color: var(--text);
        }

        .price-old {
            display: block;
            color: #999;
            text-decoration: line-through;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .price-sale {
            display: block;
            color: var(--warning);
            font-size: 1.6rem;
            font-weight: 700;
        }

        .sale-badge {
            display: inline-block;
            background: rgba(176, 65, 62, 0.1);
            color: var(--warning);
            border: 1px solid rgba(176, 65, 62, 0.25);
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            font-size: 0.62rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }

        .btn-booking {
            width: 100%;
            background: #EAE8E2;
            color: #888;
            border: none;
            padding: 1.3rem;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2rem;
            letter-spacing: 2px;
            font-size: 0.7rem;
            transition: var(--transition);
        }

        .btn-booking:not(:disabled) {
            cursor: pointer;
        }

        .dev-status {
            color: var(--warning);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 8, 0.98);
            z-index: 4000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .lightbox.active {
            opacity: 1;
            display: flex;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .lightbox-close {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .lightbox-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        .lightbox-nav {
            position: absolute;
            color: white;
            font-size: 4rem;
            cursor: pointer;
            padding: 2rem;
            user-select: none;
            opacity: 0.3;
            transition: 0.3s;
            font-family: serif;
        }

        .lightbox-nav:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-prev {
            left: 0;
        }

        .nav-next {
            right: 0;
        }

        .cal-day {
            padding: 12px 0;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .cal-day:hover:not(.empty):not(.past):not(.booked) {
            background: #f0f5ec;
            color: var(--accent);
        }

        .cal-day.past {
            color: #ccc;
            cursor: not-allowed;
            pointer-events: none;
        }

        .cal-day.booked {
            background-color: #ffeaea !important;
            color: #e74c3c !important;
            text-decoration: line-through;
            cursor: not-allowed;
            opacity: 0.7;
            pointer-events: none;
        }

        .cal-day.end-allowed {
            pointer-events: auto !important;
            cursor: pointer !important;
            opacity: 1;
            text-decoration: none !important;
            border: 1px dashed var(--accent);
        }

        .cal-day.end-allowed:hover {
            background: #f0f5ec !important;
            color: var(--accent) !important;
        }

        .selected-start,
        .selected-end {
            background: var(--accent) !important;
            color: white !important;
            font-weight: bold;
            text-decoration: none !important;
        }

        .selected-range {
            background: var(--accent-soft) !important;
            color: var(--accent);
        }

        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            animation: popupAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-icon {
            width: 60px;
            height: 60px;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 15px;
            transition: background 0.3s;
        }

        .btn-main {
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }

        @keyframes popupAnim {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        #main-content {
            animation: fadeInPage 1s ease forwards;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<script>
    let currentApt = null;
    let allImages = [];
    let currentIndex = 0;

    let calDate = new Date();
    let selectedStart = null;
    let selectedEnd = null;

    const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TNXrwDl2yIAVe6MOBaUkGKD4MrGaqmjIIoXoIBn0rv8k5bOvltbv54KG0I5b0CGUvtWSIbn0BrouzkqsgX0XZAn00DoG5W0l0';

    const MIN_BOOKING_HOURS_AHEAD = 48;
    const CHECK_IN_HOUR = 14;

    function getCheckInDateTime(dateStr) {
        const date = parseLocalDate(dateStr);

        if (!date || isNaN(date.getTime())) {
            return null;
        }

        date.setHours(CHECK_IN_HOUR, 0, 0, 0);
        return date;
    }

    function isCheckInAllowedByLeadTime(dateStr) {
        const checkInDateTime = getCheckInDateTime(dateStr);

        if (!checkInDateTime) {
            return false;
        }

        const minimumAllowedDateTime = new Date();
        minimumAllowedDateTime.setHours(
            minimumAllowedDateTime.getHours() + MIN_BOOKING_HOURS_AHEAD
        );

        return checkInDateTime >= minimumAllowedDateTime;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        await initDatabase(() => {
            currentApt = db.apartments.find(a => String(a.id) === String(id));

            if (currentApt) {
                allImages = [];

                if (currentApt.coverImage) {
                    allImages.push(currentApt.coverImage);
                }

                if (Array.isArray(currentApt.galleryImages)) {
                    allImages.push(...currentApt.galleryImages);
                }

                renderDetails();
                updateSEO(currentApt.name || 'Apartman', currentApt.location || 'Balaton');

                const mainContent = document.getElementById('main-content');
                if (mainContent) {
                    mainContent.style.display = 'block';
                }
            } else {
                window.location.href = 'index.html';
            }
        });
    });

    function getLocalDateString(date) {
        const d = new Date(date);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function parseLocalDate(dateStr) {
        if (!dateStr) return null;

        const parts = String(dateStr).split('-').map(Number);

        if (parts.length !== 3 || parts.some(Number.isNaN)) {
            return null;
        }

        return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function formatHuDate(dateStr) {
        if (!dateStr) return '-';

        const d = parseLocalDate(dateStr);

        if (!d || isNaN(d.getTime())) {
            return dateStr;
        }

        return new Intl.DateTimeFormat('hu-HU', {
            month: 'short',
            day: 'numeric'
        }).format(d);
    }

    function getCurrentLang() {
        const path = window.location.pathname.toLowerCase();

        if (path.includes('/en/')) return 'en';
        if (path.includes('/de/')) return 'de';

        return 'hu';
    }

    function isDiscountActiveForNight(apt, nightDateStr) {
    const discount = apt?.discount;

    if (!discount || discount.active !== true) {
        return false;
    }

    const amount = Number(discount.amountPerNight || 0);

    if (amount <= 0) {
        return false;
    }

    const todayStr = getLocalDateString(new Date());

    const bookingStart = discount.bookingStart || discount.start || '';
    const bookingEnd = discount.bookingEnd || discount.end || '';

    if (bookingStart && todayStr < bookingStart) {
        return false;
    }

    if (bookingEnd && todayStr > bookingEnd) {
        return false;
    }

    const stayStart = discount.stayStart || discount.start || '';
    const stayEnd = discount.stayEnd || discount.end || '';

    if (stayStart && nightDateStr < stayStart) {
        return false;
    }

    if (stayEnd && nightDateStr > stayEnd) {
        return false;
    }

    return true;
}

function getDiscountAmountForNight(apt, nightDateStr) {
    if (!isDiscountActiveForNight(apt, nightDateStr)) {
        return 0;
    }

    return Number(apt.discount.amountPerNight || 0);
}

    function getNextBookableInfo(apt) {
    const today = new Date();

    for (let i = 0; i < 370; i++) {
        const testDate = new Date(today);
        testDate.setDate(today.getDate() + i);

        const dateStr = getLocalDateString(testDate);

        const isBlockedByAdmin = Array.isArray(apt.disabledDates)
            && apt.disabledDates.includes(dateStr);

        if (isBlockedByAdmin) {
            continue;
        }

        const info = getAptStatusAndPrice(apt, testDate);

        if (info.status === 'OPEN') {
            return {
                ...info,
                dateStr
            };
        }
    }

    return {
        status: 'CLOSED',
        price: 0,
        label: '',
        minNights: 1,
        maxGuests: 2,
        dateStr: ''
    };
}

    function getReservedDatesSet() {
        const bookings = (db.bookings || []).filter(b => String(b.aptId) === String(currentApt.id));
        const reservedDates = new Set();

        bookings.forEach(b => {
            const startRaw = b.checkIn || b.start;
            const endRaw = b.checkOut || b.end;

            const curr = parseLocalDate(startRaw);
            const last = parseLocalDate(endRaw);

            if (!curr || !last || isNaN(curr.getTime()) || isNaN(last.getTime())) {
                return;
            }

            while (curr < last) {
                reservedDates.add(getLocalDateString(curr));
                curr.setDate(curr.getDate() + 1);
            }
        });

        return reservedDates;
    }

    function getBlockedDatesSet() {
        const blockedDates = new Set(Array.isArray(currentApt.disabledDates) ? currentApt.disabledDates : []);
        const reservedDates = getReservedDatesSet();

        reservedDates.forEach(date => blockedDates.add(date));

        return blockedDates;
    }

    function hasBlockedDateInRange(startStr, endStr) {
        const blockedDates = getBlockedDatesSet();

        const curr = parseLocalDate(startStr);
        const last = parseLocalDate(endStr);

        if (!curr || !last || isNaN(curr.getTime()) || isNaN(last.getTime())) {
            return true;
        }

        while (curr < last) {
            const currStr = getLocalDateString(curr);

            if (blockedDates.has(currStr)) {
                return true;
            }

            curr.setDate(curr.getDate() + 1);
        }

        return false;
    }

    function renderCalendar() {
    const daysContainer = document.getElementById('calendar-days');
    const monthYearLabel = document.getElementById('calendar-month-year');

    if (!daysContainer || !monthYearLabel) return;

    const year = calDate.getFullYear();
    const month = calDate.getMonth();

    const monthName = new Intl.DateTimeFormat('hu-HU', {
        month: 'long'
    }).format(calDate);

    monthYearLabel.innerText = `${monthName} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const startOffset = firstDay === 0 ? 6 : firstDay - 1;

    const blockedDates = getBlockedDatesSet();

    let htmlContent = '';

    for (let i = 0; i < startOffset; i++) {
        htmlContent += `<div class="cal-day empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        let className = 'cal-day';
        let onClickAttr = `onclick="selectDate('${dateStr}')"`;

        const isTooSoon = !isCheckInAllowedByLeadTime(dateStr);
        const isBlocked = blockedDates.has(dateStr);

        let canBeCheckoutDay = false;

        if (
            selectedStart &&
            !selectedEnd &&
            dateStr > selectedStart &&
            isCheckInAllowedByLeadTime(selectedStart) &&
            !hasBlockedDateInRange(selectedStart, dateStr)
        ) {
            canBeCheckoutDay = true;
        }

        if (isTooSoon) {
            className += ' past';
            onClickAttr = '';
        }

        if (isBlocked) {
            className += ' booked';

            if (canBeCheckoutDay) {
                className += ' end-allowed';
                onClickAttr = `onclick="selectDate('${dateStr}')"`;
            } else {
                onClickAttr = '';
            }
        }

        if (selectedStart && dateStr === selectedStart) {
            className += ' selected-start';
        }

        if (selectedEnd && dateStr === selectedEnd) {
            className += ' selected-end';
        }

        if (selectedStart && selectedEnd && dateStr > selectedStart && dateStr < selectedEnd) {
            className += ' selected-range';
        }

        htmlContent += `<div class="${className}" ${onClickAttr}>${d}</div>`;
    }

    daysContainer.innerHTML = htmlContent;
}

    function selectDate(dateStr) {
        if (!isCheckInAllowedByLeadTime(dateStr)) {
            showSuccess(
                'Túl közeli érkezés',
                'Foglalást legalább 48 órával az érkezés, azaz 14:00 előtt lehet leadni.',
                'error'
            );
            return;
        }

        if (!selectedStart || (selectedStart && selectedEnd)) {
            selectedStart = dateStr;
            selectedEnd = null;
        } else if (dateStr > selectedStart) {
            if (hasBlockedDateInRange(selectedStart, dateStr)) {
                showSuccess(
                    'Nem választható időszak',
                    'A kiválasztott időszak foglalt vagy letiltott napot tartalmaz.',
                    'error'
                );

                selectedStart = null;
                selectedEnd = null;
            } else {
                selectedEnd = dateStr;
            }
        } else {
            selectedStart = dateStr;
            selectedEnd = null;
        }

        document.getElementById('book-start').value = selectedStart || '';
        document.getElementById('book-end').value = selectedEnd || '';
        document.getElementById('display-start').innerText = selectedStart ? formatHuDate(selectedStart) : '-';
        document.getElementById('display-end').innerText = selectedEnd ? formatHuDate(selectedEnd) : '-';

        renderCalendar();
        calculateStay();
    }

    function changeMonth(dir) {
        calDate.setMonth(calDate.getMonth() + dir);
        renderCalendar();
    }

    function calculateStay() {
        const startVal = document.getElementById('book-start').value;
        const endVal = document.getElementById('book-end').value;

        const guestSelect = document.getElementById('book-guests');
        const guests = parseInt(guestSelect.value, 10) || 2;

        const btn = document.getElementById('submit-booking-btn');
        const totalBox = document.getElementById('grand-total');
        const infoText = document.getElementById('stay-info');

        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.background = '#EAE8E2';
        btn.style.color = '#888';

        if (!startVal || !endVal) {
            infoText.innerText = 'Válassz érkezési és távozási dátumot!';
            totalBox.innerText = '0 Ft';
            totalBox.dataset.finalTotal = '0';
            btn.innerText = 'Válassz dátumot!';
            return;
        }

        const start = parseLocalDate(startVal);
        const end = parseLocalDate(endVal);

        if (!start || !end || isNaN(start.getTime()) || isNaN(end.getTime()) || end <= start) {
            infoText.innerText = 'Hibás dátumválasztás!';
            totalBox.innerText = '0 Ft';
            totalBox.dataset.finalTotal = '0';
            btn.innerText = 'Hibás dátum';
            return;
        }

        if (hasBlockedDateInRange(startVal, endVal)) {
            infoText.innerHTML = `<span style="color:var(--warning)">A kiválasztott időszak foglalt vagy letiltott napot tartalmaz!</span>`;
            totalBox.innerText = '0 Ft';
            totalBox.dataset.finalTotal = '0';
            btn.innerText = 'Nem foglalható';
            btn.style.background = 'var(--warning)';
            btn.style.color = 'white';
            return;
        }

        const nights = Math.ceil((end - start) / (1000 * 60 * 60 * 24));

let total = 0;
let originalTotal = 0;
let discountTotal = 0;
let discountedNightCount = 0;
let minNightsRequired = 1;

for (let i = 0; i < nights; i++) {
    const currentDay = new Date(start);
    currentDay.setDate(currentDay.getDate() + i);

    const currentDateStr = getLocalDateString(currentDay);
    const info = getAptStatusAndPrice(currentApt, currentDay, guests);

    if (info.status === 'OPEN') {
        const nightlyPrice = Number(info.price || 0);
        const nightlyDiscount = getDiscountAmountForNight(currentApt, currentDateStr);
        const finalNightlyPrice = Math.max(0, nightlyPrice - nightlyDiscount);

        originalTotal += nightlyPrice;
        discountTotal += nightlyPrice - finalNightlyPrice;
        total += finalNightlyPrice;

        if (nightlyDiscount > 0) {
            discountedNightCount++;
        }

        if (Number(info.minNights || 1) > minNightsRequired) {
            minNightsRequired = Number(info.minNights || 1);
        }
    } else {
        infoText.innerHTML = `<span style="color:var(--warning)">Zárva tartás a választott napokon!</span>`;
        totalBox.innerText = 'Zárva';
        btn.innerText = 'Nem foglalható';
        btn.style.background = 'var(--warning)';
        btn.style.color = 'white';
        return;
    }
}

totalBox.dataset.finalTotal = String(total);

if (discountTotal > 0) {
    totalBox.innerHTML = `
        <div style="font-size:0.9rem; color:#999; text-decoration:line-through; margin-bottom:4px;">
            ${originalTotal.toLocaleString('hu-HU')} Ft
        </div>
        <div>
            ${total.toLocaleString('hu-HU')} Ft
        </div>
        <div style="font-size:0.75rem; color:var(--accent); font-family:'Montserrat'; font-weight:700; margin-top:4px;">
            Akciós kedvezmény: -${discountTotal.toLocaleString('hu-HU')} Ft
        </div>
    `;
} else {
    totalBox.dataset.finalTotal = String(total);
    totalBox.innerText = `${total.toLocaleString('hu-HU')} Ft`;
}

        if (nights < minNightsRequired) {
            infoText.innerHTML = `<span style="color:var(--warning)">Minimum ${minNightsRequired} éjszaka szükséges ebben az időszakban!</span>`;
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.background = 'var(--warning)';
            btn.style.color = 'white';
            btn.innerText = `Min. ${minNightsRequired} éjszaka kell`;
            return;
        }

        infoText.innerHTML = `<strong>${nights} éjszaka</strong> kiválasztva.`;
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.background = 'var(--accent)';
        btn.style.color = 'white';
        btn.innerText = 'Foglalás elküldése';
    }

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
    }

    async function sendBookingRequest() {
        const submitBtn = document.getElementById('submit-booking-btn');
        const totalElement = document.getElementById('grand-total');

        let cleanNumber = Number(totalElement?.dataset.finalTotal || 0);

        const currentLang = getCurrentLang();

        const data = {
            aptId: currentApt.id,
            aptName: currentApt.name,
            guestName: document.getElementById('book-name').value.trim(),
            email: document.getElementById('book-email').value.trim(),
            phone: document.getElementById('book-phone').value.trim(),
            checkIn: document.getElementById('book-start').value,
            checkOut: document.getElementById('book-end').value,
            guests: document.getElementById('book-guests').value,
            totalPrice: cleanNumber,
            msg: document.getElementById('book-msg').value.trim(),
            lang: currentLang,
            source: `Weboldal (${currentLang.toUpperCase()})`
        };

        if (!data.guestName || !data.email || !data.phone) {
            showSuccess(
                'Hiányzó adatok',
                'Kérjük, add meg a nevedet, e-mail címedet és telefonszámodat.',
                'error'
            );
            return;
        }

        if (!isValidEmail(data.email)) {
            showSuccess(
                'Hibás e-mail cím',
                'Kérjük, ellenőrizd az e-mail címet.',
                'error'
            );
            return;
        }

        if (!data.checkIn || !data.checkOut) {
            showSuccess(
                'Hiányzó dátum',
                'Kérjük, válassz érkezési és távozási dátumot.',
                'error'
            );
            return;
        }


        if (!isCheckInAllowedByLeadTime(data.checkIn)) {
            showSuccess(
                'Túl közeli érkezés',
                'Foglalást legalább 48 órával az érkezés, azaz 14:00 előtt lehet leadni.',
                'error'
            );
            return;
        }

        if (hasBlockedDateInRange(data.checkIn, data.checkOut)) {
            showSuccess(
                'Nem választható időszak',
                'A kiválasztott időszak foglalt vagy letiltott napot tartalmaz.',
                'error'
            );
            return;
        }

        if (data.totalPrice <= 0) {
            showSuccess(
                'Hibás összeg',
                'A foglalás összege nem számolható. Kérjük, válassz másik dátumot vagy frissítsd az oldalt.',
                'error'
            );
            return;
        }

        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.6';
            submitBtn.innerText = 'Átirányítás a fizetéshez...';
        }

        try {
            const res = await fetch('/api/create-checkout-session', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const session = await res.json();

            if (!res.ok || session.error) {
                showSuccess(
                    'Hiba!',
                    session.error || 'Nem sikerült elindítani a fizetést.',
                    'error'
                );

                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.innerText = 'Foglalás elküldése';
                }

                return;
            }

            if (!session.id) {
                showSuccess(
                    'Hiba!',
                    'A Stripe munkamenet azonosítója hiányzik.',
                    'error'
                );

                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.innerText = 'Foglalás elküldése';
                }

                return;
            }

            const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

            const redirectResult = await stripe.redirectToCheckout({
                sessionId: session.id
            });

            if (redirectResult.error) {
                showSuccess(
                    'Stripe hiba',
                    redirectResult.error.message || 'Nem sikerült átirányítani a fizetéshez.',
                    'error'
                );

                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.innerText = 'Foglalás elküldése';
                }
            }
        } catch (e) {
            console.error(e);

            showSuccess(
                'Hiba!',
                'Hálózati hiba történt a fizetés indításakor.',
                'error'
            );

            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.innerText = 'Foglalás elküldése';
            }
        }
    }

    function showSuccess(title, message, type = 'success', callback) {
        const modal = document.getElementById('custom-alert');
        const iconCircle = document.getElementById('alert-icon-circle');
        const btn = document.getElementById('alert-btn');
        const titleEl = document.getElementById('alert-title');
        const msgEl = document.getElementById('alert-msg');

        titleEl.innerText = title;
        msgEl.innerText = message;
        window.alertCallback = callback;

        if (type === 'error') {
            iconCircle.innerText = '✕';
            iconCircle.style.background = '#e74c3c';
            btn.style.background = '#e74c3c';
        } else {
            iconCircle.innerText = '✓';
            iconCircle.style.background = '#27ae60';
            btn.style.background = '#27ae60';
        }

        modal.style.display = 'flex';
    }

    function closeCustomAlert() {
        document.getElementById('custom-alert').style.display = 'none';

        if (window.alertCallback) {
            window.alertCallback();
            window.alertCallback = null;
        }
    }

    }
