<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartman Részletek | Balaton Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FCFBF9; --text: #2C3325; --accent: #5C7A4D; --border: #E3E0D8; --warning: #B0413E; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); padding-top: 40px; }

        /* BANNER */
        .dev-banner {
            background: var(--warning); color: white; text-align: center; padding: 12px;
            font-size: 0.75rem; font-weight: 600; position: fixed; top: 0; left: 0; width: 100%; z-index: 3000;
        }

        /* HEADER */
        header { position: fixed; top: 40px; left: 0; width: 100%; padding: 1.5rem 5vw; background: rgba(252, 251, 249, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display'; font-size: 1.2rem; font-weight: 700; text-decoration: none; color: var(--text); letter-spacing: 2px; }

        main { max-width: 1300px; margin: 150px auto 100px; padding: 0 5vw; }
        .apt-title { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 5vw, 4rem); font-style: italic; margin-bottom: 0.5rem; line-height: 1.1; }
        
        /* BOOKING CARD */
        .booking-card { background: white; border: 1px solid var(--border); padding: 3rem; position: sticky; top: 180px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); }
        .btn-booking { 
            width: 100%; background: #ccc; color: white; border: none; padding: 1.2rem; 
            border-radius: 50px; font-weight: 700; text-transform: uppercase; cursor: not-allowed; margin-top: 1.5rem;
            letter-spacing: 2px; font-size: 0.75rem;
        }

        /* GALLERY */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 4rem; }
        .gallery-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 2px; cursor: pointer; transition: 0.3s; }
        .gallery-img:hover { opacity: 0.9; transform: scale(1.01); }

        /* LIGHTBOX - A KÉPNÉZEGETŐ */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 4000; display: none; justify-content: center; align-items: center;
        }
        .lightbox-img { max-width: 90%; max-height: 85vh; object-fit: contain; }
        .lightbox-close { position: absolute; top: 2rem; right: 2rem; color: white; font-size: 2rem; cursor: pointer; }
        .lightbox-nav { position: absolute; color: white; font-size: 3rem; cursor: pointer; padding: 2rem; user-select: none; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }
    </style>
</head>
<body>

<div class="dev-banner">
    HU: Az oldal fejlesztés alatt áll, foglalás jelenleg nem lehetséges. | 
    EN: Site under development, booking currently not possible.
</div>

<header>
    <a href="index.html" class="logo">BALATON ESSENCE</a>
</header>

<main>
    <div style="display: grid; grid-template-columns: 1.6fr 1fr; gap: 6rem;">
        <div>
            <p id="apt-loc" style="text-transform: uppercase; letter-spacing: 3px; color: var(--accent); font-weight: 600; font-size: 0.7rem; margin-bottom: 1rem;"></p>
            <h1 id="apt-name" class="apt-title">Betöltés...</h1>
            <div style="margin: 3rem 0;">
                <img id="apt-main-img" src="" class="gallery-img" style="border-radius: 0; box-shadow: 0 30px 60px rgba(0,0,0,0.05);" onclick="openLightbox(0)">
            </div>
            <div id="apt-gallery" class="gallery-grid"></div>
        </div>

        <div>
            <div class="booking-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 1rem;">Ajánlatkérés</h3>
                <p id="apt-price" style="font-size: 1.4rem; font-weight: 400; color: #666;"></p>
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 2rem 0;">
                <p style="color: var(--warning); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6;">
                    ⚠️ A foglalási rendszer karbantartás miatt átmenetileg szünetel.
                </p>
                <button class="btn-booking" onclick="alert('Fejlesztés alatt álló funkció.')">Foglalás nem lehetséges</button>
            </div>
        </div>
    </div>
</main>

<div id="lightbox" class="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">✕</span>
    <span class="lightbox-nav nav-prev" onclick="changeImage(-1)">‹</span>
    <img id="lightbox-img" class="lightbox-img" src="">
    <span class="lightbox-nav nav-next" onclick="changeImage(1)">›</span>
</div>

<script src="database.js?v=7.0"></script>
<script>
    let currentApt = null;
    let allImages = [];
    let currentIndex = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        await initDatabase(() => {
            currentApt = db.apartments.find(a => a.id === id);
            if (currentApt) renderDetails();
        });
    });

    function renderDetails() {
        document.getElementById('apt-name').innerText = currentApt.name;
        document.getElementById('apt-loc').innerText = currentApt.location;
        document.getElementById('apt-price').innerText = currentApt.price.toLocaleString() + " Ft / éjszakától";
        
        // Képek összegyűjtése a lapozáshoz
        allImages = [currentApt.mainImage, ...(currentApt.gallery || [])];
        
        document.getElementById('apt-main-img').src = currentApt.mainImage;

        const gal = document.getElementById('apt-gallery');
        gal.innerHTML = "";
        
        // Galéria generálása kattintható képekkel
        if (currentApt.gallery) {
            currentApt.gallery.forEach((img, idx) => {
                // Az index eltolva (+1), mert a 0-dik a főborítókép
                gal.innerHTML += `<img src="${img}" class="gallery-img" onclick="openLightbox(${idx + 1})">`;
            });
        }
    }

    // --- LIGHTBOX LOGIKA ---

    function openLightbox(index) {
        currentIndex = index;
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        lbImg.src = allImages[currentIndex];
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Ne görögjön a háttér
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function changeImage(dir) {
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = allImages.length - 1;
        if (currentIndex >= allImages.length) currentIndex = 0;
        document.getElementById('lightbox-img').src = allImages[currentIndex];
    }

    // Billentyűzet támogatás (nyilak + escape)
    document.addEventListener('keydown', (e) => {
        if (document.getElementById('lightbox').style.display === 'flex') {
            if (e.key === "ArrowLeft") changeImage(-1);
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "Escape") closeLightbox();
        }
    });
</script>
</body>
</html>
