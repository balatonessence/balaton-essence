<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaton Essence - Cancellation</title>
    <style>
        :root { --primary: #5c7a4d; --dark: #2C3325; --danger: #8b0000; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: var(--dark); }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 90%; border-top: 5px solid var(--primary); }
        h2 { color: var(--primary); margin-bottom: 10px; }
        .details { background: #f9fbf8; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; text-align: left; margin: 20px 0; font-size: 14px; }
        .btn-cancel { background-color: var(--danger); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s; }
        .btn-cancel:hover { opacity: 0.8; }
        .btn-cancel:disabled { background-color: #ccc; cursor: not-allowed; }
        .success-icon { font-size: 50px; color: var(--primary); margin-bottom: 20px; }
        .hidden { display: none; }
        .error-text { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-msg">Loading... / Betöltés...</div>
        
        <div id="confirmation-ui" class="hidden">
            <h2 id="title"></h2>
            <p id="msg"></p>
            <div class="details" id="booking-info"></div>
            <button class="btn-cancel" id="cancel-btn" onclick="confirmCancel()"></button>
        </div>

        <div id="result-ui" class="hidden">
            <div class="success-icon" id="result-icon">✓</div>
            <h2 id="result-title"></h2>
            <p id="result-msg"></p>
            <br>
            <a href="/" id="back-link" style="color: var(--primary); text-decoration: none; font-weight: bold;"></a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        const lang = urlParams.get('lang') || 'hu';

        const dict = {
            hu: { 
                loading: "Adatok betöltése...",
                errorId: "Hiba: Hiányzó azonosító.",
                errorNotFound: "A foglalás már nem található vagy lemondták.",
                errorNet: "Hálózati hiba történt.",
                title: "Foglalás lemondása", 
                msg: "Biztosan le szeretné mondani az alábbi foglalást?", 
                btn: "Végleges lemondás", 
                processing: "Folyamatban...",
                success: "Sikeresen lemondva", 
                resultMsg: "A foglalást töröltük a rendszerünkből. Visszaigazoló e-mailt küldtünk.", 
                back: "Vissza a főoldalra" 
            },
            en: { 
                loading: "Loading data...",
                errorId: "Error: Missing ID.",
                errorNotFound: "Booking not found or already cancelled.",
                errorNet: "Network error occurred.",
                title: "Cancel Booking", 
                msg: "Are you sure you want to cancel the following booking?", 
                btn: "Confirm Cancellation", 
                processing: "Processing...",
                success: "Cancelled successfully", 
                resultMsg: "The booking has been removed from our system. A confirmation email has been sent.", 
                back: "Back to home" 
            },
            de: { 
                loading: "Daten werden geladen...",
                errorId: "Fehler: Fehlende ID.",
                errorNotFound: "Buchung nicht gefunden oder bereits storniert.",
                errorNet: "Netzwerkfehler aufgetreten.",
                title: "Stornierung", 
                msg: "Sind Sie sicher, dass Sie diese Buchung stornieren möchten?", 
                btn: "Stornierung bestätigen", 
                processing: "Wird bearbeitet...",
                success: "Erfolgreich storniert", 
                resultMsg: "Die Buchung wurde aus unserem System gelöscht. Eine Bestätigungs-E-Mail wurde gesendet.", 
                back: "Zurück zur Startseite" 
            }
        };

        const t = dict[lang] || dict.hu;

        async function loadBookingData() {
            const statusEl = document.getElementById('status-msg');
            statusEl.innerText = t.loading;

            if (!bookingId) {
                statusEl.innerText = t.errorId;
                statusEl.className = "error-text";
                return;
            }

            try {
                const res = await fetch('/api/get-db-content');
                const db = await res.json();
                const booking = db.bookings.find(b => String(b.id) === String(bookingId));

                if (!booking) {
                    statusEl.innerText = t.errorNotFound;
                    statusEl.className = "error-text";
                    return;
                }

                // UI feltöltése adatokkal
                document.getElementById('booking-info').innerHTML = `
                    <strong>${booking.aptName}</strong><br>
                    ${booking.checkIn} — ${booking.checkOut}<br>
                    ${booking.guestName}
                `;

                document.getElementById('title').innerText = t.title;
                document.getElementById('msg').innerText = t.msg;
                document.getElementById('cancel-btn').innerText = t.btn;
                document.getElementById('back-link').innerText = t.back;
                
                statusEl.classList.add('hidden');
                document.getElementById('confirmation-ui').classList.remove('hidden');
            } catch (e) {
                statusEl.innerText = t.errorNet;
                statusEl.className = "error-text";
            }
        }

        async function confirmCancel() {
            const btn = document.getElementById('cancel-btn');
            btn.disabled = true;
            btn.innerText = t.processing;

            try {
                const res = await fetch(`/api/cancel-booking/${bookingId}`);
                if (res.ok) {
                    document.getElementById('confirmation-ui').classList.add('hidden');
                    document.getElementById('result-ui').classList.remove('hidden');
                    document.getElementById('result-title').innerText = t.success;
                    document.getElementById('result-msg').innerText = t.resultMsg;
                } else {
                    alert(t.errorNet);
                    btn.disabled = false;
                    btn.innerText = t.btn;
                }
            } catch (e) {
                alert(t.errorNet);
                btn.disabled = false;
                btn.innerText = t.btn;
            }
        }

        loadBookingData();
    </script>
</body>
</html>
