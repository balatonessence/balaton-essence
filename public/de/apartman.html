<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Details | Balaton Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FCFBF9; --text: #2C3325; --text-light: #6A7063;  
            --accent: #5c7a4d33; --border: #E3E0D8; --warning: #B0413E;
            --shadow: rgba(44, 51, 37, 0.08);
            --transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); padding-top: 40px; -webkit-font-smoothing: antialiased; }

        .dev-banner {
            background: var(--warning); color: white; text-align: center; padding: 10px 5vw;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; position: fixed;
            top: 0; left: 0; width: 100%; z-index: 3000; text-transform: uppercase;
        }

        header { position: fixed; top: 40px; left: 0; width: 100%; padding: 1.5rem 5vw; background: rgba(252, 251, 249, 0.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }

        main { max-width: 1300px; margin: 160px auto 100px; padding: 0 5vw; }
        
        .apt-container { display: grid; grid-template-columns: 1fr; gap: 3rem; }
        @media (min-width: 992px) { .apt-container { grid-template-columns: 1.6fr 1fr; gap: 6rem; } }

        .apt-title { font-family: 'Playfair Display'; font-size: clamp(2.8rem, 5vw, 4.5rem); font-style: italic; margin-bottom: 0.5rem; line-height: 1.1; color: var(--text); }
        .apt-location-tag { text-transform: uppercase; letter-spacing: 3px; color: #5c7a4d; font-weight: 600; font-size: 0.7rem; margin-bottom: 1rem; }

        .main-image-wrapper { 
            margin: 3.5rem 0; 
            box-shadow: 0 40px 80px rgba(44, 51, 37, 0.1); 
            border-radius: 2px; 
            overflow: hidden;
            background: #eee;
            aspect-ratio: 16 / 10;
        }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-top: 5rem; }
        .img-container { background: #eee; border-radius: 2px; overflow: hidden; aspect-ratio: 4 / 3; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: var(--transition); display: block; opacity: 1; transform: translateY(0); }
        .gallery-img:hover { transform: scale(1.03); opacity: 0.9; }

        .booking-card { 
            background: white; border: 1px solid var(--border); padding: 3.5rem 3rem; 
            position: sticky; top: 180px; box-shadow: 0 30px 60px rgba(0,0,0,0.04); border-radius: 4px;
        }
        
        .price-tag { font-size: 1.6rem; font-weight: 300; color: var(--text-light); margin-bottom: 2rem; }
        .price-num { font-weight: 600; color: var(--text); }

        .btn-booking { 
            width: 100%; background: #2C3325; color: white; border: none; padding: 1.3rem; 
            border-radius: 50px; font-weight: 700; text-transform: uppercase; 
            cursor: pointer; margin-top: 2rem; letter-spacing: 2px; font-size: 0.7rem; transition: var(--transition);
        }
        .btn-booking:disabled { background: #EAE8E2; color: #888; cursor: not-allowed; }

        .dev-status { color: var(--warning); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6; display: flex; align-items: center; gap: 8px; }

        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 8, 0.98); z-index: 99999; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s ease; }
        .lightbox.active { opacity: 1; display: flex !important; }
        
        .lightbox-img { max-width: 90%; max-height: 85vh; object-fit: contain; box-shadow: 0 50px 100px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        .lightbox-close { position: absolute; top: 2.5rem; right: 2.5rem; color: white; font-size: 1.8rem; cursor: pointer; z-index: 100001; }
        .lightbox-nav { position: absolute; color: white; font-size: 4rem; cursor: pointer; padding: 2rem; user-select: none; opacity: 0.3; transition: 0.3s; }
        .lightbox-nav:hover { opacity: 1; }
        .nav-prev { left: 0; } .nav-next { right: 0; }

        .cal-day { padding: 12px 0; cursor: pointer; text-align: center; font-size: 0.9rem; border-radius: 4px; transition: 0.2s; }
        .cal-day:hover:not(.empty):not(.past):not(.booked) { background: #f0f5ec; color: #5c7a4d; }
        .cal-day.past { color: #ccc; cursor: not-allowed; }
        .cal-day.booked { background-color: #ffeaea !important; color: #e74c3c !important; text-decoration: line-through; cursor: not-allowed; opacity: 0.7; }
        .selected-start, .selected-end { background: #5c7a4d !important; color: white !important; font-weight: bold; }
        .selected-range { background: rgba(92, 122, 77, 0.1) !important; color: #5c7a4d; }

        .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100000; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; }
        .success-icon { width: 60px; height: 60px; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px; }
        /* Minden gomb, ami megkapja a btn-main osztályt */
        .btn-main {
            background-color: #5c7a4d !important; /* A Balaton Essence zöldje */
            color: white !important;               /* Fehér szöveg */
            border: none !important;
            padding: 10px 25px !important;
            border-radius: 5px !important;
            font-weight: bold !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: background-color 0.2s ease;
            display: inline-block;
            text-align: center;
        }

        .btn-main:hover {
            background-color: #4a633e !important; /* Hover esetén sötétebb zöld */
        }

        #main-content { animation: fadeInPage 1s ease forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <link rel="stylesheet" href="../mobile.css">
</head>
<body>

<header>
    <a href="index.html" class="logo-container" style="text-decoration: none; display: flex; flex-direction: column; line-height: 1.1;">
        <span style="font-family: 'Playfair Display'; font-size: 1.6rem; font-weight: 700; color: #1A1A1A; letter-spacing: 2px;">BALATON</span>
        <span style="font-family: 'Montserrat'; font-size: 0.65rem; font-weight: 400; color: #1A1A1A; text-transform: uppercase; letter-spacing: 6px; margin-top: 4px;">Essence</span>
    </a>

    <nav class="nav-links" style="display: flex; gap: 2rem;">
        <a href="index.html#apartments" style="text-decoration: none; color: #1A1A1A; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;">Apartments</a>
        <a href="rolunk.html" style="text-decoration: none; color: #1A1A1A; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;">Über uns</a>
    </nav>
</header>

<main id="main-content" style="display: none;">
    <div class="apt-container">
        <div>
            <p id="apt-loc" class="apt-location-tag"></p>
            <h1 id="apt-name" class="apt-title"></h1>
            <div class="main-image-wrapper">
                <img id="apt-main-img" src="" class="gallery-img" onclick="openLightbox(0)">
            </div>
            <div id="apt-gallery" class="gallery-grid"></div>
            <div id="apt-desc" style="margin-top: 1.5rem; font-size: 1.1rem; line-height: 1.6; color: #555;"></div>
        </div>

        <div>
            <div class="booking-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 1rem; font-style: italic;">Buchung</h3>
                <p id="apt-price" class="price-tag"></p>
                <div class="dev-status">
                    <span></span>
                    <span></span>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 2.5rem 0;">
                <button class="btn-booking" id="booking-btn" disabled>ANFRAGE SENDEN</button>
            </div>
        </div>
    </div>
</main>

<div id="booking-modal" class="lightbox">
    <div style="background: white; width: 90%; max-width: 500px; padding: 2.5rem; border-radius: 8px; position: relative; max-height: 90vh; overflow-y: auto; z-index: 100000;">
        <span class="lightbox-close" onclick="closeBookingModal()" style="color: #999; top: 1.5rem; right: 1.5rem; position: absolute; font-size: 1.5rem;">✕</span>
        <h2 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 0.5rem;">Buchungsdaten</h2>
        <p id="modal-apt-name" style="color: #5c7a4d; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 2rem;"></p>

        <div style="margin-bottom: 1.5rem;">
            <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 10px;">Zeitraum wählen</label>
            <div id="custom-calendar" style="border: 1px solid var(--border); padding: 15px; border-radius: 4px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer;">‹</button>
                    <div id="calendar-month-year" style="font-weight: 700;"></div>
                    <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer;">›</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.6rem; font-weight: 700; color: #999; margin-bottom: 10px;">
                    <div>MO</div><div>DI</div><div>MI</div><div>DO</div><div>FR</div><div>SA</div><div>SO</div>
                </div>
                <div id="calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; background: #f9f9f9; padding: 10px;">
                <span>Anreise: <strong id="display-start">-</strong></span>
                <span>Abreise: <strong id="display-end">-</strong></span>
            </div>
        </div>

        <input type="hidden" id="book-start">
        <input type="hidden" id="book-end">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem; align-items: center;">
            <div>
                <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 5px;">Gäste</label>
                <select id="book-guests" onchange="calculateStay()" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border);"></select>
            </div>
            <div id="stay-info" style="font-size: 0.8rem; color: #5c7a4d; font-weight: 600; padding-top: 15px;">Datum wählen!</div>
        </div>

        <div style="display: grid; gap: 12px; margin-bottom: 1.5rem;">
            <input type="text" id="book-name" placeholder="Vollständiger Name" style="width: 100%; padding: 1rem; border: 1px solid var(--border);">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <input type="email" id="book-email" placeholder="E-Mail Adresse">
                <input type="tel" id="book-phone" placeholder="Telefonnummer">
            </div>
            <textarea id="book-msg" placeholder="Anmerkung (optional)" rows="2" style="width: 100%; padding: 1rem; border: 1px solid var(--border);"></textarea>
        </div>

        <div id="total-price-box" style="background: #f9f9f9; padding: 1.2rem; text-align: right; margin-bottom: 1.5rem; border-left: 4px solid #5c7a4d;">
            <span style="font-size: 0.7rem; text-transform: uppercase;">Gesamtsumme:</span>
            <div id="grand-total" style="font-size: 2rem; font-weight: 700;">0 Ft</div>
        </div>

        <button onclick="sendBookingRequest()" id="submit-booking-btn" class="btn-booking" style="opacity: 0.5;">Datum wählen!</button>
    </div>
</div>

<div id="custom-alert" class="custom-modal" style="display:none;">
    <div class="modal-content">
        <div id="alert-icon-circle" class="success-icon">✓</div>
        <h2 id="alert-title">Erfolg!</h2>
        <p id="alert-msg">...</p>
        <button id="alert-btn" class="btn-main" onclick="closeCustomAlert()">OK</button>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">✕</span>
    <span class="lightbox-nav nav-prev">‹</span>
    <img id="lightbox-img" class="lightbox-img" src="" onclick="event.stopPropagation()">
    <span class="lightbox-nav nav-next">›</span>
</div>


<script src="../database.js?v=16.1"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="../figyelmeztetes.js"></script>
<script>
    let currentApt = null;
    let allImages = [];
    let currentIndex = 0;
    let calDate = new Date();
    let selectedStart = null;
    let selectedEnd = null;

    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        await initDatabase(() => {
            currentApt = db.apartments.find(a => String(a.id) === String(id));
            if (currentApt) {
                // Képek betöltése a memóriába a lépegetéshez
                allImages = [];
                if (currentApt.coverImage) allImages.push(currentApt.coverImage);
                if (currentApt.galleryImages) allImages.push(...currentApt.galleryImages);

                renderDetails();
                setupLightboxEvents(); 
                document.getElementById('main-content').style.display = 'block';
            } else {
                window.location.href = "../index.html";
            }
        });
    });

    function setupLightboxEvents() {
        const prevBtn = document.querySelector('.nav-prev');
        const nextBtn = document.querySelector('.nav-next');
        const closeBtn = document.querySelector('.lightbox-close');

        if (prevBtn) prevBtn.onclick = (e) => { e.stopPropagation(); changeImage(-1); };
        if (nextBtn) nextBtn.onclick = (e) => { e.stopPropagation(); changeImage(1); };
        if (closeBtn) closeBtn.onclick = closeLightbox;

        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (lb && lb.style.display === 'flex') {
                if (e.key === "ArrowLeft") changeImage(-1);
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "Escape") closeLightbox();
            }
        });
    }

    async function renderDetails() {
        if (!currentApt) return;
        
        // Nyelv és UI fordítások
        let lang = window.location.href.includes('/de/') ? 'de' : 'en';
        const today = new Date();
        const info = getAptStatusAndPrice(currentApt, today);
        
        document.getElementById('apt-name').innerText = currentApt.name || "";
        document.getElementById('apt-loc').innerText = currentApt.location || "";
        
        const priceTag = document.getElementById('apt-price');
        const bookingBtn = document.getElementById('booking-btn');

        if (info.status === 'OPEN') {
            priceTag.innerHTML = `<span class="price-num">${info.price.toLocaleString()} Ft</span> / ${lang === 'de' ? 'Nacht' : 'night'}`;
            bookingBtn.onclick = openBookingModal;
            bookingBtn.disabled = false;
        }

        // Főkép
        const mainImg = document.getElementById('apt-main-img');
        if (mainImg && currentApt.coverImage) {
            mainImg.src = currentApt.coverImage;
            mainImg.onclick = () => openLightbox(0);
        }

        // Galéria generálás
        const gal = document.getElementById('apt-gallery');
        if (gal && currentApt.galleryImages) {
            gal.innerHTML = currentApt.galleryImages.map((img, idx) => `
                <div class="img-container">
                    <img src="${img}" class="gallery-img" data-idx="${idx + 1}" loading="lazy">
                </div>`).join('');

            gal.querySelectorAll('.gallery-img').forEach(img => {
                img.addEventListener('click', (e) => {
                    openLightbox(parseInt(e.target.getAttribute('data-idx')));
                });
            });
        }
    }

    function openLightbox(index) {
        if (!allImages.length) return;
        currentIndex = index;
        document.getElementById('lightbox-img').src = allImages[currentIndex];
        const lb = document.getElementById('lightbox');
        lb.style.display = 'flex';
        setTimeout(() => lb.classList.add('active'), 10);
        document.body.style.overflow = 'hidden';
    }

    function changeImage(dir) {
        if (!allImages.length) return;
        currentIndex = (currentIndex + dir + allImages.length) % allImages.length;
        document.getElementById('lightbox-img').src = allImages[currentIndex];
    }

    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('active');
        setTimeout(() => { lb.style.display = 'none'; document.body.style.overflow = 'auto'; }, 500);
    }

    // Foglalási ablak német nyelven
    function openBookingModal() {
        const modal = document.getElementById('booking-modal');
        document.getElementById('modal-apt-name').innerText = currentApt.name;
        selectedStart = null; selectedEnd = null;
        document.getElementById('book-start').value = "";
        document.getElementById('book-end').value = "";
        document.getElementById('display-start').innerText = "-";
        document.getElementById('display-end').innerText = "-";
        
        const guestSelect = document.getElementById('book-guests');
        const maxAllowed = currentApt.maxGuests || 2;
        guestSelect.innerHTML = "";
        for (let i = 2; i <= maxAllowed; i++) {
            guestSelect.innerHTML += `<option value="${i}">${i === 2 ? '1-2 Personen' : i + ' Personen'}</option>`;
        }

        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
        document.body.style.overflow = 'hidden';
        renderCalendar();
        calculateStay();
    }

    function closeBookingModal() {
        const modal = document.getElementById('booking-modal');
        if (!modal) return;
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }, 400);
    }

    window.onclick = function(event) {
        const modal = document.getElementById('booking-modal');
        if (event.target == modal) closeBookingModal();
    }

    function renderCalendar() {
        const daysContainer = document.getElementById('calendar-days');
        const monthYearLabel = document.getElementById('calendar-month-year');
        const year = calDate.getFullYear();
        const month = calDate.getMonth();
        
        // Német hónapnevek
        const monthName = new Intl.DateTimeFormat('de-DE', { month: 'long' }).format(calDate);
        monthYearLabel.innerText = `${monthName} ${year}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const startOffset = firstDay === 0 ? 6 : firstDay - 1;
        const todayStr = new Date().toISOString().split('T')[0];
        
        const reservedDates = new Set();
        (db.bookings || []).filter(b => String(b.aptId) === String(currentApt.id)).forEach(b => {
            let curr = new Date(b.checkIn || b.start);
            let last = new Date(b.checkOut || b.end);
            while (curr < last) { reservedDates.add(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate() + 1); }
        });

        let html = "";
        for (let i = 0; i < startOffset; i++) html += `<div class="cal-day empty"></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            let className = "cal-day";
            let onClick = `onclick="selectDate('${dateStr}')"`;
            if (reservedDates.has(dateStr)) { className += " booked"; onClick = ""; }
            if (dateStr < todayStr) className += " past";
            if (selectedStart === dateStr) className += " selected-start";
            if (selectedEnd === dateStr) className += " selected-end";
            if (selectedStart && selectedEnd && dateStr > selectedStart && dateStr < selectedEnd) className += " selected-range";
            html += `<div class="${className}" ${onClick}>${d}</div>`;
        }
        daysContainer.innerHTML = html;
    }

    function selectDate(dateStr) {
        if (!selectedStart || (selectedStart && selectedEnd)) { selectedStart = dateStr; selectedEnd = null; }
        else if (dateStr > selectedStart) { selectedEnd = dateStr; }
        else { selectedStart = dateStr; selectedEnd = null; }
        document.getElementById('book-start').value = selectedStart || "";
        document.getElementById('book-end').value = selectedEnd || "";
        document.getElementById('display-start').innerText = selectedStart || "-";
        document.getElementById('display-end').innerText = selectedEnd || "-";
        renderCalendar();
        calculateStay();
    }

    function changeMonth(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }

    function calculateStay() {
        const startVal = document.getElementById('book-start').value;
        const endVal = document.getElementById('book-end').value;
        const btn = document.getElementById('submit-booking-btn');
        const totalBox = document.getElementById('grand-total');
        const infoText = document.getElementById('stay-info');
        
        if (!startVal || !endVal) { 
            infoText.innerText = "Daten wählen!"; 
            totalBox.innerText = "0 Ft"; 
            btn.disabled = true; 
            return; 
        }

        const start = new Date(startVal); 
        const end = new Date(endVal);
        const nights = Math.ceil((end - start) / 86400000);
        let total = 0; let minN = 1;

        for (let i = 0; i < nights; i++) {
            let d = new Date(start); d.setDate(d.getDate() + i);
            const info = getAptStatusAndPrice(currentApt, d, parseInt(document.getElementById('book-guests').value));
            if (info.status === 'OPEN') { 
                total += info.price; 
                if (info.minNights > minN) minN = info.minNights; 
            } else { 
                infoText.innerHTML = "Während der Auswahl geschlossen!"; 
                totalBox.innerText = "-"; 
                btn.disabled = true; 
                return; 
            }
        }

        totalBox.innerText = total.toLocaleString() + " Ft";
        if (nights < minN) { 
            infoText.innerHTML = `<span style="color:#b0413e">Mindestens ${minN} Nächte erforderlich!</span>`; 
            btn.disabled = true; 
            btn.innerText = `Mind. ${minN} Nächte`; 
        } else { 
            infoText.innerHTML = `<strong>${nights} Nächte</strong> ausgewählt.`; 
            btn.disabled = false; 
            btn.innerText = "Anfrage senden"; 
        }
    }

    async function sendBookingRequest() {
        const totalElement = document.getElementById('grand-total');
        let cleanNumber = parseInt(totalElement.innerText.replace(/[^0-9]/g, '')) || 0;

        const data = {
            aptId: currentApt.id,
            aptName: currentApt.name,
            guestName: document.getElementById('book-name').value,
            email: document.getElementById('book-email').value,
            phone: document.getElementById('book-phone').value,
            checkIn: document.getElementById('book-start').value,
            checkOut: document.getElementById('book-end').value,
            guests: document.getElementById('book-guests').value,
            totalPrice: cleanNumber,
            msg: document.getElementById('book-msg').value,
            lang: 'de'
        };

        const submitBtn = document.getElementById('submit-booking-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Weiterleitung zur Zahlung...";

        try {
            const res = await fetch('/api/create-checkout-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const session = await res.json();
            if (session.error) throw new Error(session.error);

            const stripe = Stripe('pk_test_51TNXrwDl2yIAVe6MOBaUkGKD4MrGaqmjIIoXoIBn0rv8k5bOvltbv54KG0I5b0CGUvtWSIbn0BrouzkqsgX0XZAn00DoG5W0l0'); 
            await stripe.redirectToCheckout({ sessionId: session.id });
        } catch (e) {
            showSuccess("Fehler!", "Zahlung konnte nem gestartet werden.", 'error');
            submitBtn.disabled = false;
            submitBtn.innerText = "Anfrage senden";
        }
    }

    function showSuccess(title, message, type, callback) {
        const modal = document.getElementById('custom-alert');
        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-msg').innerText = message;
        const icon = document.getElementById('alert-icon-circle');
        icon.innerText = type === 'error' ? '✕' : '✓';
        icon.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
        window.alertCallback = callback;
        modal.style.display = 'flex';
    }
    
    function closeCustomAlert() { 
        document.getElementById('custom-alert').style.display = 'none'; 
        if (window.alertCallback) window.alertCallback(); 
    }
</script>
