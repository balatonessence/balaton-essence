<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence Moments | Balaton Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { 
            --bg: #FCFBF9; --bg-alt: #F4F2EC; --text: #2C3325; --text-light: #6A7063;  
            --accent: #5C7A4D; --accent-hover: #48613A; --border: #E3E0D8; --shadow: rgba(44, 51, 37, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        header { padding: 2rem 5vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-container { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; }
        .logo-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; }
        .logo-sub { font-size: 0.5rem; font-weight: 500; letter-spacing: 4px; color: var(--text-light); text-transform: uppercase; }

        .section-header { text-align: center; padding: 6rem 5vw 4rem; }
        .section-header h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 5vw, 4rem); font-style: italic; margin-bottom: 1rem; }
        .section-header p { color: var(--text-light); font-style: italic; letter-spacing: 1px; }

        main { max-width: 1200px; margin: 0 auto; padding: 0 5vw 8rem; }
        .breakfast-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .breakfast-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .breakfast-grid {
                grid-template-columns: 1fr;
            }
        }
        .pillar-card { background: white; border: 1px solid var(--border); transition: 0.4s; text-align: center; cursor: pointer; overflow: hidden; }
        .pillar-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .pillar-img { width: 100%; height: 350px; background-size: cover; background-position: center; }
        .pillar-header { padding: 3rem 2rem; }
        .price-tag { font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-top: 1rem; display: block; }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(44, 51, 37, 0.7); backdrop-filter: blur(8px); 
            z-index: 5000; display: none; justify-content: center; align-items: center; 
            opacity: 0; transition: 0.4s; 
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg); width: 90%; max-width: 450px; padding: 4rem 3rem; position: relative; border-radius: 2px; }
        .close-modal { position: absolute; top: 25px; right: 25px; font-size: 1.2rem; cursor: pointer; color: var(--text-light); }
        .modal-title { font-family: 'Playfair Display'; font-size: 2.2rem; font-style: italic; text-align: center; margin-bottom: 2.5rem; }

        .form-group { margin-bottom: 1.8rem; }
        .form-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-light); display: block; margin-bottom: 0.5rem; }
        
        .essence-input { 
            width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 0.8rem 0; 
            background: transparent; font-family: 'Montserrat'; outline: none; color: var(--text); font-size: 0.95rem;
        }

        .essence-counter { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border); }
        .counter-controls { display: flex; align-items: center; gap: 1.5rem; }
        .c-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .btn-submit { 
            background: var(--accent); color: white; border: none; padding: 1.2rem; 
            border-radius: 50px; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; 
            letter-spacing: 2px; cursor: pointer; width: 100%; margin-top: 1rem; 
        }

        .moment-desc {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.6;
            margin: 1rem 0;
        }

        .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .custom-modal .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .success-icon { width: 80px; height: 80px; background: #27ae60; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
        .btn-main { background: #27ae60; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .flatpickr-calendar { background: var(--bg); border: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <span class="logo-title">BALATON</span>
        <span class="logo-sub">Essence</span>
    </a>
    <a href="index.html" style="text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text);">← Back</a>
</header>

<div class="section-header">
    <h1>ESSENCE MOMENTS</h1>
    <p>Slow mornings in our apartments in Fonyód.</p>
</div>

<main>
    <div id="moments-grid" class="breakfast-grid"></div>
</main>

<div id="morning-modal" class="modal-overlay" onclick="closeMorningModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeMorningModal()">✕</span>
        <h2 id="m-title" class="modal-title">Breakfast</h2>

        <p id="m-desc" style="
            font-size: 0.9rem;
            color: #6A7063;
            line-height: 1.7;
            margin: -1.2rem 0 2rem;
            text-align: center;
        "></p>

        <div id="order-info-box" style="display: none; margin-bottom: 25px;"></div>
        
        <div class="form-group">
            <label class="form-label">Apartment</label>
            <select id="m-apt-select" class="essence-input">
                <option value="" disabled selected>Select apartment...</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" id="m-name" class="essence-input" placeholder="Guest name">
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="m-email" class="essence-input" placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="m-phone" class="essence-input" placeholder="+36 ...">
        </div>

        <div class="form-group">
            <label class="form-label">Date</label>
            <input type="text" id="m-date" class="essence-input" placeholder="For which day?">
        </div>

        <div class="form-group">
            <label class="form-label">Number of Persons</label>
            <div class="essence-counter">
                <span style="font-size: 0.9rem;">Quantity</span>
                <div class="counter-controls">
                    <button class="c-btn" onclick="updateQty(-1)">−</button>
                    <span id="qty-num" style="font-weight:600; min-width:20px; text-align:center;">1</span>
                    <button class="c-btn" onclick="updateQty(1)">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Payment Method</label>
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <input type="radio" name="m-payment" value="cash" checked style="accent-color: #5c7a4d;"> 
                    <span>Cash on site</span>
                </label>
                <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <input type="radio" name="m-payment" value="card" style="accent-color: #5c7a4d;"> 
                    <span>Online card</span>
                </label>
            </div>
        </div>

        <input type="hidden" id="m-item-type">
        <button class="btn-submit" onclick="submitMorning()">Place Order</button>
    </div>
</div>

<div id="custom-alert" class="custom-modal" style="display:none;">
    <div class="modal-content">
        <div id="alert-icon-circle" class="success-icon">✓</div>
        <h2 id="alert-title">Success!</h2>
        <p id="alert-msg">...</p>
        <button id="alert-btn" class="btn-main" onclick="closeCustomAlert()">OK</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://js.stripe.com/v3/"></script>

<script>
    let currentQty = 1;
    let calendar;

    let momentServices = [];
    let selectedMomentService = null;

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function safeImageUrl(value) {
        const url = String(value || '').trim();

        if (!url) return '';
        if (url.startsWith('../img/')) return url;
        if (url.startsWith('/img/')) return url;
        if (url.startsWith('https://')) return url;

        if (url.startsWith('img/')) {
            return `../${url}`;
        }

        return '';
    }

    function formatPrice(value) {
        return Number(value || 0).toLocaleString('en-US');
    }

    const stripe = Stripe('pk_test_51TNXrwDl2yIAVe6MOBaUkGKD4MrGaqmjIIoXoIBn0rv8k5bOvltbv54KG0I5b0CGUvtWSIbn0BrouzkqsgX0XZAn00DoG5W0l0');

    const momentDescriptions = {
        "Breakfast plate": `
            Fresh pastries, a selection of cold cuts and cheeses, seasonal vegetables, fruits, and small treats. A comfortable, hearty breakfast that is the perfect way to start your day.
            The contents of the platter may vary depending on the season.
        `,
        "Cheese plate": `
            Carefully selected cheeses, fresh fruits, and complementary accompaniments, elegantly presented and paired with a bottle of wine from the southern Balaton region. The perfect choice for a relaxing evening or a special occasion.
            The contents of the platter may vary depending on the season.
        `,
        "Festive plate": `
            A bottle of Prosecco, two dessert slices, and carefully selected accompaniments for an elegant, intimate moment. The perfect choice for celebrations, romantic evenings, or anniversaries.
            The contents of the platter may vary depending on the season.
        `
    };

    async function loadMomentServices() {
    try {
        const res = await fetch('/api/services?t=' + Date.now());

        if (!res.ok) {
            throw new Error('Services could not be loaded.');
        }

        const data = await res.json();
        momentServices = (data.services?.moments || [])
            .filter(item => item.active !== false);

        renderMomentCards();
    } catch (error) {
        console.error('Moments loading error:', error);
        document.getElementById('moments-grid').innerHTML = `
            <div style="grid-column: 1 / -1; text-align:center; color:#b0413e;">
                Moments are currently unavailable.
            </div>
        `;
    }
}

function renderMomentCards() {
    const grid = document.getElementById('moments-grid');
    if (!grid) return;

    if (momentServices.length === 0) {
        grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align:center; color:#777;">
                No available Moments service.
            </div>
        `;
        return;
    }

    grid.innerHTML = momentServices.map(service => {
        const name = service.name_en || service.name_hu || service.id || 'Moment';
        const description = service.description_en || '';
        const image = safeImageUrl(service.image);
        const price = Number(service.price || 0);

        return `
            <div class="pillar-card" onclick="openMorningModalById('${escapeHtml(service.id)}')">
                <div class="pillar-header">
                    <h3>${escapeHtml(name)}</h3>
                    ${description ? `<p class="moment-desc">${escapeHtml(description)}</p>` : ''}
                    <span class="price-tag">${formatPrice(price)} HUF / person</span>
                </div>
                <div class="pillar-img" style="background-image: url('${escapeHtml(image)}');"></div>
            </div>
        `;
    }).join('');
}

    document.addEventListener('DOMContentLoaded', async function() {
        await loadMomentServices();
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        const bookingToken = urlParams.get('token') || '';

        const infoBox = document.getElementById('order-info-box');
        const formGroups = document.querySelectorAll('.form-group');
        const submitBtn = document.querySelector('.btn-submit');

        if (!bookingId) {
            infoBox.innerHTML = `
                <div style="background: #f4f7f2; border: 1px dashed #5c7a4d; padding: 25px; text-align: center; border-radius: 8px;">
                    <p style="color: #5c7a4d; font-weight: 700; font-size: 1.1rem; margin-bottom: 10px;">Dear Guest!</p>
                    <p style="font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px;">This service is available only for guests with a valid accommodation booking in our Fonyód apartments.</p>
                    <a href="index.html#apartments" style="display: inline-block; background: #5c7a4d; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Book your stay here</a>
                </div>
            `;

            infoBox.style.display = 'block';
            formGroups.forEach(group => group.style.display = 'none');
            if (submitBtn) submitBtn.style.display = 'none';
            return;
        }

        try {
            const res = await fetch(`/api/verify-booking/${encodeURIComponent(bookingId)}?token=${encodeURIComponent(bookingToken)}`);
            const data = await res.json();

            if (res.ok && data.valid) {
                document.getElementById('m-name').value = data.guestName || '';
                document.getElementById('m-name').readOnly = true;

                document.getElementById('m-email').value = data.email || '';
                document.getElementById('m-email').readOnly = true;

                if (data.phone) {
                    document.getElementById('m-phone').value = data.phone;
                }

                const select = document.getElementById('m-apt-select');
                select.innerHTML = `<option value="${escapeHtmlForOption(data.aptName || '')}">${escapeHtmlForOption(data.aptName || '')}</option>`;
                select.disabled = true;
            } else {
                showSuccess("Error!", data.error || "Invalid booking ID.", "error");
                if (submitBtn) submitBtn.disabled = true;
            }
        } catch (e) {
            console.error(e);
            showSuccess("Error!", "Could not verify your booking.", "error");
            if (submitBtn) submitBtn.disabled = true;
        }

        calendar = flatpickr("#m-date", {
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "F j, Y",
            minDate: new Date().fp_incr(1)
        });
    });

    function escapeHtmlForOption(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function openMorningModalById(serviceId) {
        const service = momentServices.find(item => String(item.id) === String(serviceId));

        if (!service) {
            showSuccess("Error!", "Selected service is not available.", "error");
            return;
        }

        selectedMomentService = service;
        currentQty = 1;

        const name = service.name_en || service.name_hu || service.id || 'Moment';
        const description = service.description_en || '';

        document.getElementById('qty-num').innerText = currentQty;
        document.getElementById('m-item-type').value = service.id;
        document.getElementById('m-title').innerText = name;
        document.getElementById('m-desc').innerText = description;

        const modal = document.getElementById('morning-modal');
        modal.style.display = 'flex';

        setTimeout(() => {
            modal.classList.add('active');
        }, 10);
    }

    function closeMorningModal() {
        const modal = document.getElementById('morning-modal');
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
        }, 400);
    }

    function updateQty(val) {
        currentQty = Math.max(1, currentQty + val);
        document.getElementById('qty-num').innerText = currentQty;
    }

    async function submitMorning() {
        const apt = document.getElementById('m-apt-select').value;
        const phone = document.getElementById('m-phone').value.trim();
        const name = document.getElementById('m-name').value.trim();
        const email = document.getElementById('m-email').value.trim();
        const date = document.getElementById('m-date').value;
        const itemType = document.getElementById('m-item-type').value;
        const method = document.querySelector('input[name="m-payment"]:checked')?.value || 'cash';

        if (!apt || !name || !date || !phone || !email || !itemType) {
            return showSuccess("Error!", "Please fill in all fields!", "error");
        }

        if (!selectedMomentService) {
            return showSuccess("Error!", "Please select a Moment first.", "error");
        }

        const itemName = selectedMomentService.name_en || selectedMomentService.name_hu || selectedMomentService.id || itemType;
        const pricePerUnit = Number(selectedMomentService.price || 0);
        const totalAmount = currentQty * pricePerUnit;

        if (totalAmount <= 0) {
            return showSuccess("Error!", "Invalid price. Please contact us.", "error");
        }

        const payload = {
            type: 'BREAKFAST',
            guestName: name,
            email: email,
            phone: phone,
            apartment: apt,
            start: date,
            end: date,
            days: 1,
            guests: currentQty,
            amount: totalAmount,
            totalPrice: totalAmount,
            method: method,
            lang: 'en',
            items: `${itemName} × ${currentQty} person${currentQty > 1 ? 's' : ''}`
        };

        const submitBtn = document.querySelector('.btn-submit');
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerText = method === 'card' ? 'Redirecting to payment...' : 'Sending order...';
        }

        try {
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await res.json();

            if (res.ok) {
                closeMorningModal();

                if (method === 'card' && result.stripeSessionId) {
                    await stripe.redirectToCheckout({ sessionId: result.stripeSessionId });
                } else {
                    showSuccess(
                        "Success!",
                        `Breakfast order recorded. Payable on site: ${totalAmount.toLocaleString()} HUF.`,
                        "success",
                        () => location.reload()
                    );
                }
            } else {
                showSuccess("Error!", result.error || "Order could not be saved.", "error");
            }
        } catch (e) {
            console.error(e);
            showSuccess("Error!", "Network error occurred.", "error");
        } finally {
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Place Order';
            }
        }
    }

    function showSuccess(title, message, type = 'success', callback) {
        const modal = document.getElementById('custom-alert');
        const iconCircle = document.getElementById('alert-icon-circle');
        const btn = document.getElementById('alert-btn');

        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-msg').innerText = message;
        window.alertCallback = callback;

        if (type === 'error') {
            iconCircle.innerText = '✕';
            iconCircle.style.background = '#e74c3c';
            btn.style.background = '#e74c3c';
        } else {
            iconCircle.innerText = '✓';
            iconCircle.style.background = '#27ae60';
            btn.style.background = '#27ae60';
        }

        modal.style.display = 'flex';
    }

    function closeCustomAlert() {
        document.getElementById('custom-alert').style.display = 'none';

        if (window.alertCallback) {
            window.alertCallback();
            window.alertCallback = null;
        }
    }
</script>
</body>
</html>
