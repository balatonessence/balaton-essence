<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaton Essence | Élmény, amit megérzel.</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FCFBF9; --bg-alt: #F4F2EC; --text: #2C3325; --text-light: #6A7063;  
            --accent: #5C7A4D; --accent-hover: #48613A; --border: #E3E0D8; --shadow: rgba(44, 51, 37, 0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        header { position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(252, 251, 249, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); transition: 0.3s; }
        .logo-container { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .logo-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: var(--text); letter-spacing: 2px; line-height: 1; }
        .logo-sub { font-size: 0.6rem; font-weight: 500; letter-spacing: 4px; color: var(--text-light); text-transform: uppercase; margin-top: 4px; }
        
        nav { display: flex; gap: 2rem; align-items: center; }
        .nav-link { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text); text-decoration: none; transition: 0.3s; }
        
        .btn-primary { background: var(--accent); color: white; border: 1px solid var(--accent); padding: 0.8rem 2rem; border-radius: 50px; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1.5px; cursor: pointer; transition: 0.4s; text-decoration: none; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(92, 122, 77, 0.2); }

        .hero { height: 100vh; display: flex; align-items: center; padding: 0 5vw; background: linear-gradient(to right, rgba(252,251,249, 1) 0%, rgba(252,251,249, 0.85) 45%, rgba(252,251,249, 0) 100%), url('https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat; }
        .hero-content { max-width: 650px; margin-top: 5rem; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 5vw, 4.5rem); line-height: 1.1; margin-bottom: 1.5rem; color: var(--text); }

        /* PILLARS */
        .pillars-section { padding: 5rem 5vw 8rem 5vw; background: var(--bg); max-width: 1600px; margin: 0 auto; }
        .pillars-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .pillar-card { background: white; border: 1px solid var(--border); box-shadow: 0 15px 40px var(--shadow); transition: 0.4s; text-align: center; }
        .pillar-card:hover { transform: translateY(-10px); }
        .pillar-header { padding: 3rem 2rem; }
        .pillar-img { width: 100%; height: 250px; background-size: cover; background-position: center; }

        /* CUSTOM LOGIN MODAL STYLES */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 51, 37, 0.7); backdrop-filter: blur(8px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; }
        .login-overlay.active { display: flex; opacity: 1; }
        .login-modal { background: var(--bg); width: 90%; max-width: 400px; padding: 4rem 3rem; position: relative; border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); text-align: center; }
        .login-modal h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 2rem; color: var(--text); }
        .login-input { width: 100%; border: none; border-bottom: 2px solid var(--border); padding: 1rem 0; margin-bottom: 2rem; outline: none; font-family: 'Montserrat'; font-size: 1.2rem; text-align: center; background: transparent; transition: 0.3s; }
        .login-input:focus { border-bottom-color: var(--accent); }
        .close-login { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem; color: var(--text-light); }

        footer { background: var(--accent); padding: 4rem 5vw; color: white; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <span class="logo-title">BALATON</span>
        <span class="logo-sub">Essence</span>
    </a>
    <nav>
        <a href="#apartments" class="nav-link">Apartmanok</a>
        <a href="#pillars" class="nav-link">Élmények</a>
        <button class="btn-primary" style="padding: 0.6rem 1.5rem;" onclick="openLoginModal()">Admin</button>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1 class="hero-title">A Balaton esszenciája — <br>élmény, amit <i>megérzel</i>.</h1>
        <a href="#pillars" class="btn-primary">Felfedezés</a>
    </div>
</section>

<section id="pillars" class="pillars-section">
    <div class="pillars-grid">
        <div class="pillar-card">
            <div class="pillar-header">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 1rem;">SUP & SUN</h3>
                <p style="font-style: italic; color: var(--text-light); margin-bottom: 1.5rem;">Vízparti élmények.</p>
                <button class="btn-primary">Kínálatunk</button>
            </div>
            <div class="pillar-img" style="background-image: url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=80');"></div>
        </div>
        <div class="pillar-card">
            <div class="pillar-header">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 1rem;">APARTMENTS</h3>
                <p style="font-style: italic; color: var(--text-light); margin-bottom: 1.5rem;">Prémium szállások.</p>
                <button class="btn-primary" onclick="window.location.href='apartman.html?id=1'">Megnézem</button>
            </div>
            <div class="pillar-img" style="background-image: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80');"></div>
        </div>
        <div class="pillar-card">
            <div class="pillar-header">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 1rem;">SLOW MORNING</h3>
                <p style="font-style: italic; color: var(--text-light); margin-bottom: 1.5rem;">Lassú reggelek.</p>
                <button class="btn-primary">Rendelés</button>
            </div>
            <div class="pillar-img" style="background-image: url('https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?auto=format&fit=crop&w=800&q=80');"></div>
        </div>
    </div>
</section>

<div id="login-overlay" class="login-overlay" onclick="closeLoginModal()">
    <div class="login-modal" onclick="event.stopPropagation()">
        <div class="close-login" onclick="closeLoginModal()">✕</div>
        <h2>Admin belépés</h2>
        <p style="color: var(--text-light); font-size: 0.8rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px;">Kérjük adja meg a kódot</p>
        <input type="password" id="admin-password" class="login-input" placeholder="••••••••" onkeyup="if(event.key === 'Enter') attemptLogin()">
        <button class="btn-primary" style="width: 100%; padding: 1rem;" onclick="attemptLogin()">Belépés</button>
    </div>
</div>

<footer>
    <p>© 2026 Balaton Essence - Ederics</p>
</footer>

<script src="database.js"></script>
<script>
    // Adatbázis inicializálás indításkor
    initDatabase();

    function openLoginModal() {
        const overlay = document.getElementById('login-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('active'), 10);
        document.getElementById('admin-password').focus();
    }

    function closeLoginModal() {
        const overlay = document.getElementById('login-overlay');
        overlay.classList.remove('active');
        setTimeout(() => overlay.style.display = 'none', 400);
        document.getElementById('admin-password').value = '';
    }

    function attemptLogin() {
        const passInput = document.getElementById('admin-password').value;
        const correctCode = db.adminCode || "admin123";

        if (passInput === correctCode) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            window.location.href = "admin.html";
        } else {
            alert("Hibás kód!");
            document.getElementById('admin-password').value = '';
        }
    }
</script>
</body>
</html>
