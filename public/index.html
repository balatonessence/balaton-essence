<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaton | Essence • Sun • Morning</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --accent-essence: #E76F51; --accent-sun: #E9C46A; --accent-morning: #2A9D8F; --text: #1A1A1A; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: #000; overflow: hidden; height: 100vh; }

        .portal-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        @media (min-width: 768px) {
            .portal-container { flex-direction: row; }
        }

        .portal-card {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        /* Asztali nézeten kinyíló effekt */
        @media (min-width: 768px) {
            .portal-card:hover { flex: 1.6; }
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s ease;
            z-index: 1;
        }

        .portal-card:hover .bg-img {
            transform: scale(1.05);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            transition: background 0.4s ease;
            z-index: 2;
        }

        .portal-card:hover .overlay {
            background: rgba(0, 0, 0, 0.3);
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: white;
            padding: 2rem;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .portal-card:hover .content {
            transform: translateY(0);
        }

        h2 {
            font-family: 'Playfair Display';
            font-size: clamp(2rem, 4vw, 4rem);
            line-height: 1.1;
            margin-bottom: 0.5rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }

        .btn-enter {
            display: inline-block;
            border: 1px solid white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            transition-delay: 0.1s;
        }

        .portal-card:hover .btn-enter {
            opacity: 1;
            transform: translateY(0);
            background: white;
            color: var(--text);
        }

        /* Egyedi színek és képek */
        #essence .bg-img { background-image: url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&w=1200&q=80'); }
        #essence h2 span { color: var(--accent-essence); }

        #sun .bg-img { background-image: url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1200&q=80'); }
        #sun h2 span { color: var(--accent-sun); }

        #morning .bg-img { background-image: url('https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?auto=format&fit=crop&w=1200&q=80'); }
        #morning h2 span { color: var(--accent-morning); }

    </style>
</head>
<body>

<div class="portal-container">

    <a href="essence.html" class="portal-card" id="essence">
        <div class="bg-img"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Balaton<span>.</span>Essence</h2>
            <div class="subtitle">Exkluzív Szállások</div>
            <div class="btn-enter">Felfedezés</div>
        </div>
    </a>

    <a href="sun.html" class="portal-card" id="sun">
        <div class="bg-img"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Balaton<span>.</span>Sun</h2>
            <div class="subtitle">SUP & Napágy Bérlés</div>
            <div class="btn-enter">Felfedezés</div>
        </div>
    </a>

    <a href="morning.html" class="portal-card" id="morning">
        <div class="bg-img"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Balaton<span>.</span>Morning</h2>
            <div class="subtitle">Prémium Reggelik</div>
            <div class="btn-enter">Felfedezés</div>
        </div>
    </a>

</div>

</body>
</html>
