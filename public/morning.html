<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaton Morning | Prémium Reggeli Kiszállítás</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* A Morning specifikus friss zöld színvilág */
        :root { --bg: #F9F9F7; --text: #1A1A1A; --accent: #2A9D8F; --accent-hover: #21867a; --selection: rgba(42, 157, 143, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(249, 249, 247, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-family: 'Playfair Display'; font-size: 1.5rem; font-weight: 700; cursor: pointer; text-decoration: none; color: var(--text); }
        .logo span { color: var(--accent); }
        
        nav { display: flex; gap: 1rem; }
        .nav-btn { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 0.6rem 1.2rem; border-radius: 50px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; background: none; text-decoration: none; color: var(--text); }
        .btn-outline { border-color: #ddd; }
        .btn-outline:hover { border-color: var(--text); }

        /* HERO */
        .hero { height: 60vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: url('https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?auto=format&fit=crop&w=1920&q=80') center/cover; opacity: 0.85; z-index: -2; }
        .hero::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(249,249,247,0.4), var(--bg)); z-index: -1; }
        .hero-title { font-family: 'Playfair Display'; font-size: clamp(3rem, 8vw, 6rem); line-height: 1; text-align: center; color: #111; }
        .hero-title span { color: var(--accent); font-style: italic; }

        /* TERMÉK RÁCS (GRID) */
        main { padding: 5rem 5vw 10rem 5vw; max-width: 1400px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 4rem; color: #888; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 3rem; }
        
        .product-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.03); transition: 0.4s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        .prod-img { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .prod-info { padding: 2rem; display: flex; flex-direction: column; flex: 1; }
        .prod-title { font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .prod-price { font-weight: 700; color: var(--accent); margin-bottom: 1.5rem; font-size: 1.1rem; }
        .prod-desc { font-size: 0.9rem; color: #666; line-height: 1.6; margin-bottom: 2rem; flex: 1; }
        
        .btn-cta { background: var(--text); color: white; border: none; padding: 1rem; width: 100%; border-radius: 50px; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.4s; }
        .btn-cta:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(42, 157, 143, 0.3); }

        /* MODALOK ÁLTALÁNOS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .custom-modal { background: #fff; width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; overflow-y: auto; }
        @media (min-width: 768px) { .custom-modal { width: 90%; height: 85vh; max-width: 1000px; border-radius: 8px; flex-direction: row; overflow: hidden; } }

        .close-x { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; z-index: 100; background: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .modal-visual { height: 30vh; background-color: #000; position: relative; flex-shrink: 0; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; color: white; }
        .modal-visual::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index: 0; }
        .modal-visual h3 { position: relative; z-index: 1; font-family: 'Playfair Display'; font-size: 2.5rem; }
        @media (min-width: 768px) { .modal-visual { flex: 1; height: 100%; padding: 4rem; } }
        
        .modal-body { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .modal-body { padding: 4rem; } }

        /* NAPTÁR ÉS IDŐPONT */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 1rem; width: 100%; }
        .day { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        @media (min-width: 768px) { .day { height: 50px; font-size: 0.9rem; } }
        .day.selected { background: var(--text) !important; color: #fff !important; }
        .day.in-range { background: var(--selection); }
        .day.disabled { color: #ccc !important; cursor: not-allowed !important; text-decoration: line-through; opacity: 0.3; }

        .time-selector { margin-top: 1.5rem; }
        .time-selector select { width: 100%; padding: 1rem; border: 1px solid #eee; border-radius: 4px; font-family: 'Montserrat'; outline: none; cursor: pointer; background: #fafafa; }
        .time-selector select:focus { border-color: var(--accent); }

        /* TOAST */
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--text); color: white; padding: 1rem 2rem; border-radius: 4px; font-size: 0.8rem; transform: translateX(150%); transition: 0.4s; }
        .toast.show { transform: translateX(0); }
        
        input { width: 100%; border: none; border-bottom: 2px solid #eee; padding: 1rem 0; margin-bottom: 1.5rem; outline: none; font-family: 'Montserrat'; font-size: 1.1rem; background: transparent;}
        input:focus { border-bottom-color: var(--accent); }
    </style>
</head>
<body>

<div id="toast-container"></div>

<header>
    <a href="index.html" class="logo">Balaton<span>.</span>Morning</a>
    <nav>
        <a href="index.html" class="nav-btn btn-outline">Vissza a Portálra</a>
    </nav>
</header>

<section class="hero">
    <h1 class="hero-title">Tökéletes<br><span>Napindító.</span></h1>
</section>

<main>
    <div class="section-title">Reggelik és Brunch Tálak</div>
    <div class="products-grid" id="products-grid">
        </div>
</main>

<div id="booking-modal" class="modal-overlay" onclick="closeBooking()">
    <div class="custom-modal" onclick="event.stopPropagation()">
        <div class="close-x" onclick="closeBooking()">✕</div>
        <div class="modal-visual" id="book-visual">
            <h3 id="book-name-tag"></h3>
        </div>
        <div class="modal-body">
            <div id="step-1" style="height: 100%; display: flex; flex-direction: column;">
                <h4 style="margin-bottom: 1rem; font-size: 0.8rem; text-transform: uppercase; color: #888;">1. Kiszállítási időpont</h4>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">←</button>
                    <strong id="cal-month-year" style="font-family:'Playfair Display'; font-size:1.2rem;"></strong>
                    <button onclick="changeMonth(1)" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">→</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
                
                <div class="time-selector">
                    <select id="delivery-time">
                        <option value="08:00 - 08:30">08:00 - 08:30 között</option>
                        <option value="08:30 - 09:00">08:30 - 09:00 között</option>
                        <option value="09:00 - 09:30">09:00 - 09:30 között</option>
                        <option value="09:30 - 10:00">09:30 - 10:00 között</option>
                    </select>
                </div>

                <div style="margin:2rem 0; padding:1.5rem 0; border-top:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.8rem; font-weight:700;">TÁLAK SZÁMA:</span>
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <button onclick="updateQty(-1)" style="border:1px solid #ddd; background:#fff; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">-</button>
                        <span id="val-qty" style="font-weight:700;">1</span>
                        <button onclick="updateQty(1)" style="border:1px solid #ddd; background:#fff; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">+</button>
                    </div>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                    <span id="total-price" style="font-family:'Playfair Display'; font-size:2.2rem; color:var(--accent); font-weight:700;">0 Ft</span>
                    <button class="btn-cta" id="confirm-btn" style="width:auto; padding: 1rem 2rem;" disabled onclick="goToStep2()">Tovább</button>
                </div>
            </div>

            <div id="step-2" style="display:none; height:100%; flex-direction:column;">
                <h2 style="font-family:'Playfair Display'; font-size:2.5rem; margin-bottom:2rem;">Kiszállítás & Kapcsolat</h2>
                
                <input type="text" id="g-address" placeholder="Pontos cím vagy Apartman neve *">
                <input type="text" id="g-name" placeholder="Megrendelő neve *">
                <input type="tel" id="g-phone" placeholder="Telefonszám (futárnak) *">
                
                <div style="margin-top:auto;">
                    <button class="btn-cta" id="submit-booking-btn" onclick="finalSubmit()">Rendelés leadása</button>
                </div>
            </div>

            <div id="success-msg" style="display:none; text-align:center; padding-top:4rem; height:100%;">
                <h2 style="font-family:'Playfair Display'; font-size:3rem; color:var(--accent);">Köszönjük!</h2>
                <p style="margin-top:1rem; color:#666;">A rendelést rögzítettük. Futárunk a megadott időablakban érkezik a friss reggelivel!</p>
                <button class="btn-cta" style="margin-top:3rem;" onclick="closeBooking()">Rendben</button>
            </div>
        </div>
    </div>
</div>

<script src="database.js"></script>
<script>
    // Lokális termékadatbázis a Morning aloldalhoz
    const morningItems = [
        {
            id: "M1",
            name: "Klasszikus Páros Brunch",
            price: 14000,
            desc: "Prémium felvágottak, kézműves sajtok, frissen sült pékáru, vaj, házi lekvár és 2 db frissen facsart narancslé (2 főre).",
            image: "https://images.unsplash.com/photo-1538220856186-0be0e085984d?auto=format&fit=crop&w=800&q=80"
        },
        {
            id: "M2",
            name: "Romantikus Pezsgős Reggeli",
            price: 24000,
            desc: "Füstölt lazac, kaviár, friss eper, croissant, és egy üveg behűtött prémium pezsgő (2 főre).",
            image: "https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=800&q=80"
        },
        {
            id: "M3",
            name: "Fitt Napindító Tál",
            price: 12000,
            desc: "Gluténmentes magvas kenyér, avokádókrém, házi chia puding friss gyümölcsökkel és 2 db zöld smoothie (2 főre).",
            image: "https://images.unsplash.com/photo-1494859802809-d069c3b71a8a?auto=format&fit=crop&w=800&q=80"
        }
    ];

    let curItem = null, selDate = null, qty = 1, view = new Date();
    view.setDate(1);

    function showToast(m) {
        const t = document.createElement('div'); t.className = 'toast show'; t.innerText = m;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
    }

    function renderProducts() {
        const grid = document.getElementById('products-grid'); grid.innerHTML = "";
        morningItems.forEach(item => {
            grid.innerHTML += `
                <div class="product-card">
                    <div class="prod-img" style="background-image: url('${item.image}')"></div>
                    <div class="prod-info">
                        <h3 class="prod-title">${item.name}</h3>
                        <div class="prod-price">${item.price.toLocaleString()} Ft</div>
                        <p class="prod-desc">${item.desc}</p>
                        <button class="btn-cta" onclick="openBooking('${item.id}')">Megrendelem</button>
                    </div>
                </div>`;
        });
    }

    // RENDELÉSI LOGIKA
    function openBooking(id) {
        curItem = morningItems.find(i => i.id === id); 
        document.getElementById('book-name-tag').innerText = curItem.name;
        document.getElementById('book-visual').style.backgroundImage = `url(${curItem.image})`;
        
        selDate = null; qty = 1; document.getElementById('val-qty').innerText = 1;
        document.getElementById('step-1').style.display='flex'; document.getElementById('step-2').style.display='none'; document.getElementById('success-msg').style.display='none';
        document.getElementById('booking-modal').style.display='flex'; renderCal(); 
        setTimeout(()=>document.getElementById('booking-modal').classList.add('active'),10);
    }
    
    function closeBooking() { document.getElementById('booking-modal').classList.remove('active'); setTimeout(()=>document.getElementById('booking-modal').style.display='none',400); }
    
    function updateQty(c) { qty = Math.max(1, qty + c); document.getElementById('val-qty').innerText = qty; updateSum(); }
    
    // NAPTÁR (Csak következő napi vagy azutáni rendelés leadható)
    function renderCal() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = "";
        const mNames = ["Január", "Február", "Március", "Április", "Május", "Június", "Július", "Augusztus", "Szeptember", "Október", "November", "December"];
        document.getElementById('cal-month-year').innerText = `${view.getFullYear()} ${mNames[view.getMonth()]}`;
        
        ["Hé", "Ke", "Sze", "Cs", "Pé", "Szo", "Va"].forEach(d => grid.innerHTML += `<div style="font-size:0.6rem; font-weight:700; color:#999; margin-bottom:10px;">${d}</div>`);
        
        const first = new Date(view.getFullYear(), view.getMonth(), 1).getDay();
        const days = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
        const offset = (first === 0 ? 7 : first) - 1;
        
        for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;
        
        // Hogy ne lehessen visszamenőleg rendelni
        const today = new Date(); 
        today.setHours(0,0,0,0);
        
        for(let d=1; d<=days; d++) {
            const date = new Date(view.getFullYear(), view.getMonth(), d);
            const isPast = date < today; 
            const isS = selDate && date.getTime() === selDate.getTime();
            
            const el = document.createElement('div'); 
            el.className = `day ${isS?'selected':''} ${isPast?'disabled':''}`; 
            el.innerText = d;
            
            if(!isPast) {
                el.onclick = () => { selDate = date; renderCal(); };
            }
            grid.appendChild(el);
        }
        updateSum();
    }

    function updateSum() {
        if(selDate) {
            const total = qty * curItem.price;
            document.getElementById('total-price').innerText = `${total.toLocaleString()} Ft`; 
            document.getElementById('confirm-btn').disabled = false;
        } else { 
            document.getElementById('total-price').innerText = "0 Ft"; 
            document.getElementById('confirm-btn').disabled = true; 
        }
    }

    function changeMonth(dir) { view.setMonth(view.getMonth()+dir); renderCal(); }
    function goToStep2() { document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='flex'; }
    
    async function finalSubmit() {
        const a = document.getElementById('g-address').value;
        const n = document.getElementById('g-name').value;
        const p = document.getElementById('g-phone').value;
        const t = document.getElementById('delivery-time').value;

        if(!n || !p || !a) return showToast("Minden adat megadása kötelező!");
        
        document.getElementById('submit-booking-btn').disabled = true; 
        document.getElementById('submit-booking-btn').innerText = "Feldolgozás...";
        
        await new Promise(r => setTimeout(r, 1000));
        
        // Mentés a közös adatbázisba extra mezőkkel összevonva
        db.bookings.push({ 
            id: Date.now(), 
            aptName: `${qty}x ${curItem.name} (${t}) - ${a}`, // Belerakjuk az időpontot és címet is
            guestName: n, 
            checkIn: selDate.toISOString().split('T')[0], 
            checkOut: selDate.toISOString().split('T')[0], 
            guests: qty * 2, // Mivel a tálak 2 fősek
            totalPrice: parseInt(document.getElementById('total-price').innerText.replace(/\D/g,'')), 
            source: 'morning_delivery' 
        });
        
        saveDb(); 
        
        document.getElementById('step-2').style.display='none'; 
        document.getElementById('success-msg').style.display='block'; 
        
        // Form alaphelyzetbe állítása
        document.getElementById('g-name').value = '';
        document.getElementById('g-address').value = '';
        document.getElementById('g-phone').value = '';
        document.getElementById('submit-booking-btn').disabled = false; 
        document.getElementById('submit-booking-btn').innerText = "Rendelés leadása";
    }

    // Inicializálás
    initDatabase(renderProducts);
</script>
</body>
</html>
