<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendelés visszaigazolása | Balaton Essence</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --essence-green: #5c7a4d;
            --essence-dark: #1a1a1a;
            --essence-white: #faf8f5;
            --danger: #8b0000;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--essence-white);
            font-family: 'Montserrat', sans-serif;
            color: var(--essence-dark);
            text-align: center;
            box-sizing: border-box;
        }

        .success-container {
            max-width: 520px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--essence-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 40px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        .icon-circle.error {
            background: var(--danger);
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        p {
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }

        .details-box {
            background: #f9fbf8;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 35px;
            background: var(--essence-green);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--essence-dark);
            transform: translateY(-2px);
        }

        .countdown {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--essence-green);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="success-container">
    <div id="loader" class="loader"></div>

    <div id="icon" class="icon-circle" style="display:none;">✓</div>

    <h1 id="t-title">Rendelés véglegesítése...</h1>
    <p id="t-msg">Kérjük, ne zárd be az ablakot, amíg ellenőrizzük a fizetést.</p>

    <div class="details-box">
        <div id="service-type" style="font-weight: 600; color: var(--essence-green); margin-bottom: 5px;">Szolgáltatás ellenőrzése</div>
        <div id="order-id" style="color: #999; font-size: 0.8rem;">Azonosító: ...</div>
    </div>

    <a href="/" id="t-btn" class="btn-home">Vissza a főoldalra</a>

    <div class="countdown" id="countdown-box" style="display:none;">
        <span id="t-redir">Automatikus átirányítás</span>
        <span id="seconds">10</span>
        <span id="t-sec">másodperc múlva...</span>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const rawLang = params.get('lang') || 'hu';
    const lang = ['hu', 'en', 'de'].includes(rawLang) ? rawLang : 'hu';

    const sessionId = params.get('session_id');

    const translations = {
    hu: {
        pageTitle: 'Rendelés visszaigazolása | Balaton Essence',
        processingTitle: 'Rendelés véglegesítése...',
        processingMsg: 'Kérjük, ne zárd be az ablakot, amíg ellenőrizzük a fizetést.',
        successTitle: 'Köszönjük!',
        successMsg: 'A fizetés sikeres volt, a rendelésedet rögzítettük a rendszerünkben.',
        errorTitle: 'Hiba történt',
        errorMsg: 'A fizetés állapota nem ellenőrizhető. Kérjük, vedd fel velünk a kapcsolatot az info@balatonessence.com címen.',
        btn: 'Vissza a főoldalra',
        redir: 'Automatikus átirányítás',
        sec: 'másodperc múlva...',
        serviceProcessing: 'Szolgáltatás ellenőrzése',
        serviceSuccess: 'Szolgáltatás rögzítve',
        serviceError: 'Sikertelen ellenőrzés',
        homeUrl: '/',
        breakfastType: 'Reggeli rendelés',
        extraType: 'Extra szolgáltatás'
    },
    en: {
        pageTitle: 'Order Confirmation | Balaton Essence',
        processingTitle: 'Finalizing order...',
        processingMsg: 'Please do not close this window while we verify your payment.',
        successTitle: 'Thank you!',
        successMsg: 'Payment successful, your order has been recorded in our system.',
        errorTitle: 'Something went wrong',
        errorMsg: 'Payment status could not be verified. Please contact us at info@balatonessence.com.',
        btn: 'Back to home',
        redir: 'Redirecting automatically in',
        sec: 'seconds...',
        serviceProcessing: 'Verifying service',
        serviceSuccess: 'Service confirmed',
        serviceError: 'Verification failed',
        homeUrl: '/en/',
        breakfastType: 'Breakfast order',
        extraType: 'Extra service'
    },
    de: {
        pageTitle: 'Bestellbestätigung | Balaton Essence',
        processingTitle: 'Bestellung wird abgeschlossen...',
        processingMsg: 'Bitte schließen Sie dieses Fenster nicht, während wir Ihre Zahlung überprüfen.',
        successTitle: 'Vielen Dank!',
        successMsg: 'Die Zahlung war erfolgreich, Ihre Bestellung wurde in unserem System registriert.',
        errorTitle: 'Etwas ist schiefgelaufen',
        errorMsg: 'Der Zahlungsstatus konnte nicht überprüft werden. Bitte kontaktieren Sie uns unter info@balatonessence.com.',
        btn: 'Zurück zur Startseite',
        redir: 'Automatische Weiterleitung in',
        sec: 'Sekunden...',
        serviceProcessing: 'Service wird überprüft',
        serviceSuccess: 'Service bestätigt',
        serviceError: 'Überprüfung fehlgeschlagen',
        homeUrl: '/de/',
        breakfastType: 'Frühstücksbestellung',
        extraType: 'Extra-Service'
    }
};

    const t = translations[lang] || translations.hu;

    document.documentElement.lang = lang;
    document.title = t.pageTitle;

    const loader = document.getElementById('loader');
    const icon = document.getElementById('icon');
    const title = document.getElementById('t-title');
    const msg = document.getElementById('t-msg');
    const btn = document.getElementById('t-btn');
    const serviceType = document.getElementById('service-type');
    const orderId = document.getElementById('order-id');
    const countdownBox = document.getElementById('countdown-box');

    title.innerText = t.processingTitle;
    msg.innerText = t.processingMsg;
    btn.innerText = t.btn;
    btn.href = t.homeUrl;
    serviceType.innerText = t.serviceProcessing;

    document.getElementById('t-redir').innerText = t.redir;
    document.getElementById('t-sec').innerText = t.sec;

    if (sessionId) {
        orderId.innerText = 'ID: ' + sessionId.substring(0, 15) + '...';
    } else {
        orderId.innerText = 'ID: -';
    }

    async function finalizeExtraOrder() {
    if (!sessionId) {
        showError();
        return;
    }

    try {
        const response = await fetch(
            `/api/finalize-extra?session_id=${encodeURIComponent(sessionId)}`
        );

        const result = await response.json().catch(() => null);

        if (!response.ok || !result || result.success !== true) {
            console.error('Finalize extra failed:', result);
            showError(result?.error);
            return;
        }

        if (result.order && result.order.type === 'BREAKFAST') {
            serviceType.innerText = t.breakfastType;
        } else if (result.order && result.order.type === 'EXTRA') {
            serviceType.innerText = t.extraType;
        } else {
            serviceType.innerText = t.serviceSuccess;
        }

        showSuccess();
    } catch (err) {
        console.error('Finalize extra error:', err);
        showError();
    }
}

    function showSuccess() {
        loader.style.display = 'none';
        icon.style.display = 'flex';
        icon.classList.remove('error');
        icon.innerText = '✓';

        title.innerText = t.successTitle;
        msg.innerText = t.successMsg;
        countdownBox.style.display = 'block';

        startCountdown();
    }

    function showError(errorText = null) {
        loader.style.display = 'none';
        icon.style.display = 'flex';
        icon.classList.add('error');
        icon.innerText = '✕';

        title.innerText = t.errorTitle;
        msg.innerText = errorText ? `${t.errorMsg} (${errorText})` : t.errorMsg;
        serviceType.innerText = t.serviceError;
    }

    function startCountdown() {
        let timeLeft = 10;
        document.getElementById('seconds').innerText = timeLeft;

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = t.homeUrl;
            }
        }, 1000);
    }

    finalizeExtraOrder();
</script>

</body>
</html>
