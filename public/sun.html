<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUP & SUN | Balaton Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/hu.js"></script>
    
    <style>
        :root { 
            --bg: #FCFBF9; --bg-alt: #F4F2EC; --text: #2C3325; --text-light: #6A7063;  
            --accent: #5C7A4D; --accent-hover: #48613A; --border: #E3E0D8; --shadow: rgba(44, 51, 37, 0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        header { padding: 2rem 5vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-container { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; }
        .logo-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; }
        .logo-sub { font-size: 0.5rem; font-weight: 500; letter-spacing: 4px; color: var(--text-light); text-transform: uppercase; }

        .section-header { text-align: center; padding: 6rem 5vw 4rem; }
        .section-header h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 5vw, 4rem); font-style: italic; }

        main { max-width: 1200px; margin: 0 auto; padding: 0 5vw 8rem; }

        .rent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 3rem; }
        .pillar-card { background: white; border: 1px solid var(--border); transition: 0.4s; text-align: center; cursor: pointer; }
        .pillar-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .pillar-img { width: 100%; height: 350px; background-size: cover; background-position: center; }
        .pillar-header { padding: 3rem 2rem; }
        .price-tag { font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-top: 1rem; display: block; }

        /* MODAL */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(44, 51, 37, 0.7); backdrop-filter: blur(8px); 
            z-index: 5000; display: none; justify-content: center; align-items: center; 
            opacity: 0; transition: 0.4s; 
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg); width: 90%; max-width: 450px; padding: 4rem 3rem; position: relative; }
        .close-modal { position: absolute; top: 25px; right: 25px; font-size: 1.2rem; cursor: pointer; color: var(--text-light); }

        .modal-title { font-family: 'Playfair Display'; font-size: 2.2rem; font-style: italic; text-align: center; margin-bottom: 2.5rem; }

        .form-group { margin-bottom: 2rem; }
        .form-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-light); display: block; margin-bottom: 0.8rem; }
        
        .essence-input { 
            width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 0.8rem 0; 
            background: transparent; font-family: 'Montserrat'; outline: none; color: var(--text); font-size: 0.95rem;
        }


/* 3 KÁRTYÁS GRID STÍLUSOK */
.sun-cards-section {
    padding: 0 1rem 6rem 1rem;
    max-width: 1200px;
    margin: 0 auto;
}

.sun-cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5rem;
}

.sun-item-card {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    border: 1px solid #f0f0f0;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
}

.sun-item-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 45px rgba(0,0,0,0.08);
}

/* ÚJ: Kép garantált kitöltése */
.sun-card-img {
    width: 100%;
    height: 400px; /* Ezt növelheted/csökkentheted, ha más arányt akarsz */
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    border-bottom: 1px solid #f0f0f0;
}

.sun-card-content {
    padding: 2.5rem 1.5rem;
    text-align: center;
    background-color: #faf9f6;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.sun-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: #2c3e50;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
}

.sun-card-price {
    font-size: 1.1rem;
    color: #5a6b5a;
    font-weight: 700;
}

.sun-card-price small {
    font-size: 0.85rem;
    color: #888;
    font-weight: 400;
}

/* Mobilnézet */
@media (max-width: 950px) {
    .sun-cards-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 650px) {
    .sun-cards-grid {
        grid-template-columns: 1fr;
    }
    .sun-card-img {
        height: 300px;
    }
}

img {
    border: none;
    outline: none;
    padding: 0;
    margin: 0;
}
        /* Mennyiségválasztó (Plusz/Mínusz gombok) stílusa */
.qty-selector {
    display: flex;
    align-items: center;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 2px 4px;
}

.qty-btn {
    background: transparent;
    border: none;
    font-size: 1.2rem;
    color: #666;
    cursor: pointer;
    padding: 0 8px;
    transition: color 0.2s ease;
}

.qty-btn:hover {
    color: #000;
}

.qty-val {
    font-weight: 600;
    font-size: 1rem;
    color: #333;
    min-width: 24px;
    text-align: center;
    user-select: none; /* Ne lehessen véletlenül kijelölni a számot kattintáskor */
}

/* Mobilnézet */
@media (max-width: 768px) {
    .sun-price-tags {
        flex-direction: column;
        gap: 0.8rem;
    }
    .price-separator {
        display: none; /* Mobilon nem kell a vonal az egymás alatti árakhoz */
    }
}

/* ELEGÁNS EGYEDI CHECKBOX STÍLUS */

/* Elrejtjük az eredeti inputot */
.modal-overlay input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
}

/* A container label */
.extras-item-label {
    display: flex;
    align-items: center;
    position: relative;
    cursor: pointer;
    gap: 12px; /* Távolság a checkbox és a szöveg között */
    user-select: none;
    flex-grow: 1; /* Kitölti a teret a +/- gombokig */
}

/* Az egyedi checkbox alapállapota */
.custom-checkmark {
    position: relative;
    height: 22px;
    width: 22px;
    background-color: #fff;
    border: 1px solid #ccc;
    border-radius: 4px; /* Enyhe kerekítés */
    transition: all 0.3s ease;
}

/* Stílus, ha a kurzor fölé megy */
.extras-item-label:hover input ~ .custom-checkmark {
    border-color: #5a6b5a; /* A te zölded */
}

/* Stílus, ha be van jelölve */
.modal-overlay input:checked ~ .custom-checkmark {
    background-color: #5a6b5a; /* A te zölded */
    border-color: #5a6b5a;
}

/* A pipa jele (checkmark - elrejtve alapból) */
.custom-checkmark:after {
    content: "";
    position: absolute;
    display: none;
    left: 7px;
    top: 3px;
    width: 5px;
    height: 10px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

/* Megjelenítjük a pipát, ha be van jelölve */
.modal-overlay input:checked ~ .custom-checkmark:after {
    display: block;
}

/* Szöveg stílusa a checkbox mellett */
.item-text-main {
    font-size: 1rem;
    color: #333;
}

.item-text-price {
    font-size: 0.85rem;
    color: #777;
    margin-left: 5px;
}
        /* SZÁMLÁLÓ */
        .essence-counter { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border); }
        .counter-controls { display: flex; align-items: center; gap: 1.5rem; }
        .c-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .c-btn:hover { border-color: var(--accent); color: var(--accent); }

        .btn-submit { 
            background: var(--accent); color: white; border: none; padding: 1.2rem; 
            border-radius: 50px; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; 
            letter-spacing: 2px; cursor: pointer; width: 100%; margin-top: 2rem; 
        }

        /* FLATPICKR ESSENCE TÉMA */
        .flatpickr-calendar { background: var(--bg); border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .flatpickr-day.selected { background: var(--accent) !important; border-color: var(--accent) !important; }
        .flatpickr-months .flatpickr-month { color: var(--text); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <span class="logo-title">BALATON</span>
        <span class="logo-sub">Essence</span>
        <a href="index.html" style="text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text);">← Vissza</a>
    </a>
</header>


<main>
    <div class="section-header" style="text-align: center; margin-top: 4rem; margin-bottom: 3rem;">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 400; letter-spacing: 4px; color: #333; margin-bottom: 0.5rem;">SUP & SUN</h1>
        <p style="font-size: 0.9rem; color: #777; letter-spacing: 2px; text-transform: uppercase;">Élményfoglalás</p>
    </div>

    <section class="sun-cards-section">
        <div class="sun-cards-grid">
            
            <div class="sun-item-card" onclick="openRentModal('Strandfelszerelés')">
                <div class="sun-card-img" style="background-image: url('img/sup.png');"></div>
                <div class="sun-card-content">
                    <h3 class="sun-card-title">SUP</h3>
                    <p class="sun-card-price">5.900 Ft <small>/ nap</small></p>
                </div>
            </div>
            
            <div class="sun-item-card" onclick="openRentModal('Strandfelszerelés')">
                <div class="sun-card-img" style="background-image: url('img/napozoszek.png');"></div>
                <div class="sun-card-content">
                    <h3 class="sun-card-title">Napozószék</h3>
                    <p class="sun-card-price">1.500 Ft <small>/ nap</small></p>
                </div>
            </div>

            <div class="sun-item-card" onclick="openRentModal('Strandfelszerelés')">
                <div class="sun-card-img" style="background-image: url('img/napernyo.png');"></div>
                <div class="sun-card-content">
                    <h3 class="sun-card-title">Napernyő</h3>
                    <p class="sun-card-price">1.000 Ft <small>/ nap</small></p>
                </div>
            </div>

        </div>
    </section>
</main>

<div id="rent-modal" class="modal-overlay" onclick="closeRentModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeRentModal()">&times;</span>
        <h2 id="m-title" style="font-family: 'Playfair Display', serif; margin-bottom: 1.5rem; text-align: center;">Felszerelés Foglalása</h2>
        
        <form id="rent-form" onsubmit="submitRentForm(event)">
            <div style="margin-bottom: 1.5rem; text-align: left; background: #fbfbfb; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                    <label class="extras-item-label">
                        <input type="checkbox" id="item-sup" onchange="updateLiveTotal()"> 
                        <span class="custom-checkmark"></span>
                        <span class="item-text-main">SUP <small style="color: #777;">(4.500 Ft/nap)</small></span>
                    </label>
                    <div class="qty-selector">
                        <button type="button" class="qty-btn" onclick="changeQty('qty-sup', -1)">−</button>
                        <span id="qty-sup" class="qty-val">1</span>
                        <button type="button" class="qty-btn" onclick="changeQty('qty-sup', 1)">+</button>
                    </div>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                    <label class="extras-item-label">
                        <input type="checkbox" id="item-sunbed" onchange="updateLiveTotal()"> 
                        <span class="custom-checkmark"></span>
                        <span class="item-text-main">Napozószék <small style="color: #777;">(1.500 Ft/nap)</small></span>
                    </label>
                    <div class="qty-selector">
                        <button type="button" class="qty-btn" onclick="changeQty('qty-sunbed', -1)">−</button>
                        <span id="qty-sunbed" class="qty-val">1</span>
                        <button type="button" class="qty-btn" onclick="changeQty('qty-sunbed', 1)">+</button>
                    </div>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label class="extras-item-label">
                        <input type="checkbox" id="item-umbrella" onchange="updateLiveTotal()"> 
                        <span class="custom-checkmark"></span>
                        <span class="item-text-main">Napernyő <small style="color: #777;">(1.000 Ft/nap)</small></span>
                    </label>
                    <div class="qty-selector">
                        <button type="button" class="qty-btn" onclick="changeQty('qty-umbrella', -1)">−</button>
                        <span id="qty-umbrella" class="qty-val">1</span>
                        <button type="button" class="qty-btn" onclick="changeQty('qty-umbrella', 1)">+</button>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label style="display: block; font-size: 0.7rem; color: #999; text-transform: uppercase; margin-bottom: 4px; text-align: left;">Kezdés</label>
                    <input type="text" id="r-start" required onchange="updateLiveTotal()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.7rem; color: #999; text-transform: uppercase; margin-bottom: 4px; text-align: left;">Befejezés</label>
                    <input type="text" id="r-end" required onchange="updateLiveTotal()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;">
                </div>
            </div>

            <input type="text" id="r-name" placeholder="Teljes neved" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            <input type="tel" id="r-phone" placeholder="Telefonszámod" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            <input type="text" id="r-apt" placeholder="Apartman neve vagy 'KÜLSŐS'" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">

            <div id="live-total-display" style="padding: 20px; background: #faf9f6; text-align: right; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee;">
                <span style="font-size: 0.8rem; color: #777; letter-spacing: 1px;">VÁRHATÓ VÉGÖSSZEG:</span>
                <div id="modal-total-amount" style="font-size: 2rem; font-weight: 700; color: #5a6b5a; font-family: 'Playfair Display', serif;">0 Ft</div>
            </div>

            <button type="submit" class="btn-book-extras" style="width: 100%; margin: 0; padding: 1.2rem; background: #5a6b5a; color: white; border: none; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;">Foglalás elküldése</button>
        </form>
    </div>
</div>

<div id="success-popup" class="modal-overlay" style="display: none; align-items: center; justify-content: center;">
    <div class="modal-content" style="text-align: center; max-width: 400px; padding: 3rem 2rem;">
        <div style="font-size: 4rem; color: #5a6b5a; margin-bottom: 1rem;">✓</div>
        <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 1rem;">Köszönjük!</h2>
        <div id="success-details" style="margin-bottom: 2rem; color: #666; line-height: 1.5;"></div>
        <button onclick="window.location.href='index.html'" class="btn-book-extras" style="width: 100%; margin: 0;">Vissza a főoldalra</button>
    </div>
</div>

<div id="success-popup" class="modal-overlay" style="display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(4px);">
    <div style="background: white; padding: 3rem 2rem; border-radius: 12px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2);">
        <div style="font-size: 4rem; color: #5a6b5a; margin-bottom: 1.5rem;">✓</div>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; color: #333; margin-bottom: 1rem;">Sikeres foglalás!</h2>
        <div id="success-details" style="color: #666; line-height: 1.6; margin-bottom: 2rem; font-size: 1rem;">
            </div>
        <button onclick="goToHome()" class="btn-book-extras" style="width: 100%; margin: 0; cursor: pointer;">Vissza a főoldalra</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/hu.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const config = {
            locale: "hu",
            dateFormat: "Y-m-d",
            minDate: "today",
            onChange: function() {
                updateLiveTotal(); // Automatikusan számol, ha választasz dátumot
            }
        };

        // Aktiváljuk a szép naptárat
        flatpickr("#r-start", config);
        flatpickr("#r-end", config);
    });

    // Mennyiség váltó
    function changeQty(id, delta) {
        const el = document.getElementById(id);
        let val = parseInt(el.innerText) || 1;
        val = Math.max(1, val + delta);
        el.innerText = val;
        updateLiveTotal();
    }

    // Élő ár számítás
    function updateLiveTotal() {
        let daily = 0;
        if(document.getElementById('item-sup').checked) daily += (parseInt(document.getElementById('qty-sup').innerText) || 1) * 4500;
        if(document.getElementById('item-sunbed').checked) daily += (parseInt(document.getElementById('qty-sunbed').innerText) || 1) * 1500;
        if(document.getElementById('item-umbrella').checked) daily += (parseInt(document.getElementById('qty-umbrella').innerText) || 1) * 1000;

        const start = document.getElementById('r-start').value;
        const end = document.getElementById('r-end').value;
        let days = 0;

        if(start && end) {
            const d1 = new Date(start);
            const d2 = new Date(end);
            if(d2 >= d1) {
                days = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
            }
        }
        document.getElementById('modal-total-amount').innerText = (daily * days).toLocaleString() + " Ft";
        return { total: daily * days, days: days };
    }

    // Modal kezelés
    function openRentModal(title) {
        document.getElementById('rent-modal').style.display = 'flex';
        setTimeout(() => document.getElementById('rent-modal').classList.add('active'), 10);
        updateLiveTotal();
    }

    function closeRentModal() {
        const m = document.getElementById('rent-modal');
        m.classList.remove('active');
        setTimeout(() => { m.style.display = 'none'; }, 400);
    }

    // Beküldés
    async function submitRentForm(e) {
        e.preventDefault();
        
        const items = [];
        if(document.getElementById('item-sup').checked) items.push(document.getElementById('qty-sup').innerText + "x SUP");
        if(document.getElementById('item-sunbed').checked) items.push(document.getElementById('qty-sunbed').innerText + "x Napozószék");
        if(document.getElementById('item-umbrella').checked) items.push(document.getElementById('qty-umbrella').innerText + "x Napernyő");

        if(items.length === 0) return alert("Válassz legalább egy eszközt!");

        const calc = updateLiveTotal();
        const orderData = {
            type: "Strandfelszerelés",
            items: items.join(", "),
            guestName: document.getElementById('r-name').value,
            phone: document.getElementById('r-phone').value,
            apartment: document.getElementById('r-apt').value,
            start: document.getElementById('r-start').value,
            end: document.getElementById('r-end').value,
            days: calc.days,
            totalPrice: calc.total,
            status: "Új"
        };

        try {
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            if(res.ok) {
                // ITT A JAVÍTÁS: Előbb bezárjuk a régit, aztán KÉNYSZERÍTJÜK a Popupot
                document.getElementById('rent-modal').style.display = 'none';
                
                const successDetails = document.getElementById('success-details');
                successDetails.innerHTML = `
                    <p>Sikeresen lefoglalva: <strong>${orderData.items}</strong></p>
                    <p>Összesen: <strong>${orderData.totalPrice.toLocaleString()} Ft</strong></p>
                    <p style="font-size:0.8rem; margin-top:10px;">Hamarosan keresünk a megadott számon!</p>
                `;
                
                const popup = document.getElementById('success-popup');
                popup.style.display = 'flex';
                setTimeout(() => popup.classList.add('active'), 10);
            }
        } catch (err) {
            alert("Hiba történt a küldéskor.");
        }
    }
</script>
</body>
</html>
