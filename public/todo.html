<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Közös Feladatlista | Balaton Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5c7a4d;
            --accent: #d4a373;
            --bg: #f4f3ef;
            --text: #2c3325;
            --surface: #ffffff;
            --border: #e3e0d8;
        }

        body {
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(44, 51, 37, 0.05);
            align-self: flex-start;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin: 0 0 10px 0;
            color: var(--text);
        }

        .subtitle {
            color: var(--accent);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Új feladat hozzáadása */
        .add-todo-form {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 2px solid var(--bg);
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            font-size: 15px;
            background: #faf9f6;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(92, 122, 77, 0.1);
            background: #fff;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .add-btn:hover { background: #4a633e; transform: translateY(-2px); }
        .add-btn:active { transform: translateY(0); }
        .add-btn:disabled { background: #b2b9bf; cursor: not-allowed; transform: none; }

        /* Lista stílusa */
        .todo-list { list-style: none; padding: 0; margin: 0; }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg);
            margin-bottom: 12px;
            border-radius: 14px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .todo-item:hover {
            border-color: var(--border);
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .todo-text { 
            flex: 1; 
            font-size: 15px; 
            font-weight: 500; 
            padding-right: 20px;
            line-height: 1.4;
        }

        .delete-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid rgba(92, 122, 77, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .delete-btn:hover { 
            background: rgba(92, 122, 77, 0.1); 
            border-color: var(--primary); 
        }

        .loading { text-align: center; color: var(--accent); padding: 20px; font-weight: 500; }

        /* --- PRÉMIUM EGYEDI POPUP (MODAL) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 51, 37, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            width: 60px; height: 60px;
            background: rgba(92, 122, 77, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px;
            margin: 0 auto 20px auto;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--text);
            margin: 0 0 10px 0;
        }

        .modal-text {
            color: var(--text-light);
            font-size: 15px;
            margin: 0 0 30px 0;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            font-family: inherit;
        }

        .btn-cancel:hover { background: #f0f0f0; color: var(--text); }

        .btn-confirm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            font-family: inherit;
        }

        .btn-confirm:hover { background: #4a633e; }
        .btn-confirm:disabled { background: #b2b9bf; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="container">
    <h1>Közös Fejlesztési Lista</h1>
    <div class="subtitle">Balaton Essence x Kristóf</div>

    <form class="add-todo-form" id="addForm">
        <input type="text" id="todoText" placeholder="Új feladat leírása..." required autocomplete="off">
        <button type="submit" class="add-btn">Hozzáadás</button>
    </form>

    <div id="todoContainer">
        <div class="loading">Betöltés...</div>
    </div>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <div class="modal-icon">✓</div>
        <h2 class="modal-title">Feladat kész?</h2>
        <p class="modal-text">Biztosan elkészültél ezzel a feladattal? A törlés végleges, a listáról eltűnik.</p>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Mégsem</button>
            <button class="btn-confirm" id="confirmDeleteBtn">Igen, kész!</button>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('todoContainer');
    const addForm = document.getElementById('addForm');
    
    // Popup változók
    const modal = document.getElementById('customModal');
    const confirmBtn = document.getElementById('confirmDeleteBtn');
    let todoIdToDelete = null;

    // Lista betöltése
    async function fetchTodos() {
        try {
            const res = await fetch('/api/get-todos');
            if (!res.ok) throw new Error('Szerver hiba');
            const todos = await res.json();
            renderTodos(todos);
        } catch (err) {
            container.innerHTML = '<div style="color:#cc0000; text-align:center;">Hiba a betöltéskor. Nézd meg a konzolt!</div>';
        }
    }

    // Lista kirajzolása
    function renderTodos(todos) {
        if (todos.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#aaa; font-style:italic; padding: 20px;">Nincs aktív feladat. Minden kész! ✨</p>';
            return;
        }

        container.innerHTML = '';
        const list = document.createElement('ul');
        list.className = 'todo-list';

        todos.forEach(todo => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            // Itt már a custom popupot hívjuk meg a sima deleteTodo helyett
            li.innerHTML = `
                <span class="todo-text">${todo.text}</span>
                <button class="delete-btn" onclick="openModal(${todo.id})">KÉSZ / TÖRLÉS</button>
            `;
            list.appendChild(li);
        });
        container.appendChild(list);
    }

    // Új feladat küldése
    addForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = document.getElementById('todoText').value;
        const btn = addForm.querySelector('.add-btn');
        btn.disabled = true;

        try {
            await fetch('/api/add-todo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            addForm.reset();
            fetchTodos();
        } catch (err) {
            alert('Nem sikerült hozzáadni a feladatot.');
        } finally {
            btn.disabled = false;
        }
    });

    // --- POPUP LOGIKA ---

    // Popup megnyitása
    function openModal(id) {
        todoIdToDelete = id;
        modal.classList.add('active');
    }

    // Popup bezárása
    function closeModal() {
        todoIdToDelete = null;
        modal.classList.remove('active');
    }

    // Ha a sötét háttérre kattint, akkor is bezárul
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
    });

    // Törlés végrehajtása a gombnyomásra
    confirmBtn.addEventListener('click', async () => {
        if (!todoIdToDelete) return;
        
        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Törlés...';

        try {
            await fetch('/api/delete-todo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: todoIdToDelete })
            });
            fetchTodos();
            closeModal();
        } catch (err) {
            alert('Hiba történt a törlés során.');
        } finally {
            // Gomb visszaállítása a következő alkalomra
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Igen, kész!';
        }
    });

    // Kezdeti betöltés
    fetchTodos();
</script>

</body>
</html>
